<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YKS Analiz Merkezi | Kerim Vurucu Özel Sürüm</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { light: '#3b82f6', dark: '#1d4ed8', bg: '#0f172a' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s ease; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .sidebar-item.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-900/40; }
        .mobile-sidebar-item.active { @apply text-blue-500 bg-blue-500/10; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .photo-upload-wrapper input[type="file"] { display: none; }
        .photo-upload-wrapper:hover .overlay { display: flex; }
        input, select, textarea { font-size: 16px !important; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script>
  window.onerror = function(message, source, lineno, colno, error) {
    document.body.innerHTML = '<div style="background:red; color:white; padding:20px; font-family:sans-serif; z-index:9999; position:absolute; top:0; left:0; width:100%; height:100%;">' + 
    '<b>Sistem Çöktü! Hata Kodu:</b><br><br>' + message + '<br><br><b>Satır:</b> ' + lineno + 
    '</div>';
  };
</script>

</head>
<body class="bg-gray-50 dark:bg-brand-bg text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-brand-bg px-4">
        <div class="max-w-md w-full glass p-8 rounded-3xl shadow-2xl border border-gray-800 relative">
            <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload();" class="absolute top-4 right-4 text-xs text-red-500 hover:text-red-400 bg-red-500/10 px-3 py-1 rounded-lg border border-red-500/20"><i class="fas fa-trash-alt mr-1"></i>Sıfırla</button>
            
            <div class="text-center mb-6 mt-4">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-xl shadow-blue-900/50 font-bold text-3xl">Y</div>
                <h1 class="text-3xl font-bold text-white tracking-tight">YKS <span class="text-blue-500">Analiz</span></h1>
                <p class="text-gray-400 text-sm mt-1">Geleceğini Verilerle Yönet</p>
            </div>
            
            <div class="flex gap-2 mb-6 bg-gray-800/50 p-1 rounded-2xl border border-gray-700">
                <button id="tab-login" onclick="showAuthTab('login')" class="flex-1 py-2.5 font-bold rounded-xl bg-blue-600 text-white transition">Giriş Yap</button>
                <button id="tab-register" onclick="showAuthTab('register')" class="flex-1 py-2.5 font-bold rounded-xl text-gray-400 hover:text-white transition">Kayıt Ol</button>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <input type="tel" id="login-phone" placeholder="Telefon Numarası" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 transition text-white" required>
                <input type="text" id="login-no" placeholder="Okul Numarası" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 transition text-white" required>
                <div class="flex items-center gap-2 p-1">
                    <input type="checkbox" id="remember-me" class="w-5 h-5 accent-blue-600 cursor-pointer">
                    <label for="remember-me" class="text-sm text-gray-400 cursor-pointer">Beni Hatırla</label>
                </div>
                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition shadow-lg shadow-blue-900/50">Sisteme Giriş</button>
            </form>

            <form id="register-form" onsubmit="handleRegister(event)" class="hidden space-y-4 max-h-[400px] overflow-y-auto pr-2 hide-scroll">
                <input type="text" id="reg-schoolName" placeholder="Okul Adı" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 transition text-white" required>
                <input type="text" id="reg-schoolNo" placeholder="Okul No" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 transition text-white" required>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="reg-firstName" placeholder="İsim" class="p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 transition text-white" required>
                    <input type="text" id="reg-lastName" placeholder="Soyisim" class="p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 transition text-white" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="reg-grade" class="p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 text-white">
                        <option>12. Sınıf</option><option>Mezun</option><option>11. Sınıf</option>
                    </select>
                    <input type="text" id="reg-branch" placeholder="Şube (SAY/EA)" class="p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 text-white">
                </div>
                <input type="tel" id="reg-phone-input" placeholder="Telefon No" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-blue-500 transition text-white" required>
                <button type="submit" class="w-full py-4 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-bold transition shadow-lg shadow-green-900/50">Hesabı Oluştur</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-1 h-screen overflow-hidden">
        <aside class="w-72 glass border-r border-gray-800 flex flex-col shrink-0 hidden md:flex">
            <div class="p-8 border-b border-gray-800 flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-bold text-2xl text-white shadow-lg shadow-blue-900/40 border border-white/20">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div>
                    <h2 class="font-bold text-white leading-tight tracking-tight text-xl">YKS<span class="text-blue-500">.</span></h2>
                    <p class="text-[10px] text-blue-500 font-bold tracking-widest uppercase opacity-80">Koçluk Sistemi</p>
                </div>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-2 mt-4" id="sidebar-nav"></nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="document.documentElement.classList.toggle('dark');" class="w-full p-3 flex items-center justify-center gap-2 hover:bg-gray-800 rounded-xl transition text-sm">
                    <i class="fas fa-adjust"></i><span>Görünüm Değiştir</span>
                </button>
            </div>
        </aside>

        <div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-gray-800 flex overflow-x-auto hide-scroll p-1.5 z-40 bg-brand-bg/95 gap-1.5 snap-x" id="mobile-nav"></div>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 relative pb-28 md:pb-12 bg-gray-50 dark:bg-brand-bg">
            <header class="mb-8 flex justify-between items-center">
                <div>
                    <h2 id="view-title" class="text-3xl font-bold text-gray-900 dark:text-white tracking-tight">Panel</h2>
                    <p class="text-xs text-gray-500 mt-1 font-mono tracking-widest uppercase" id="current-date-header"></p>
                </div>
                <div id="timer-badge" class="hidden px-5 py-2.5 bg-red-600/20 text-red-500 rounded-2xl border border-red-500/50 animate-pulse font-mono font-bold shadow-lg shadow-red-900/20">00:00:00</div>
            </header>
            
            <div id="view-container" class="animate-in slide-in-from-bottom-4 duration-500 h-full"></div>
            
            <footer class="mt-12 py-8 text-center border-t border-gray-800/30 text-gray-500 text-xs font-medium tracking-[0.3em] uppercase">
                <span class="text-blue-500 font-bold">MEHMET KERİM VURUCU</span> © 2026
            </footer>

            <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-3"></div>
        </main>
    </div>

    <div id="task-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center bg-black/70 backdrop-blur-md px-4">
        <div class="w-full max-w-sm glass p-8 rounded-3xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-xl text-blue-400" id="task-modal-title">Görev Ekle</h3>
                <button onclick="document.getElementById('task-modal').classList.add('hidden')" class="text-gray-400 hover:text-white w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-800 transition"><i class="fas fa-times"></i></button>
            </div>
            <div class="mb-5">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Asistan Tavsiyeleri</label>
                <div id="smart-suggestions" class="flex flex-wrap gap-2 max-h-[100px] overflow-y-auto hide-scroll"></div>
            </div>
            <div class="space-y-4">
                <select id="modal-ders" onchange="updateModalSubj()" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition text-white"></select>
                <select id="modal-konu" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition text-white"></select>
                <input type="number" id="modal-q" placeholder="Hedef Soru Sayısı" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition text-white">
                <button onclick="saveTaskModal()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold text-white transition mt-2 shadow-xl shadow-blue-900/30">Programa Kaydet</button>
            </div>
        </div>
    </div>

    <div id="done-task-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center bg-black/70 backdrop-blur-md px-4">
        <div class="w-full max-w-sm glass p-8 rounded-3xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-xl text-green-400">Görevi Tamamla</h3>
                <button onclick="document.getElementById('done-task-modal').classList.add('hidden')" class="text-gray-400 hover:text-white w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-800 transition"><i class="fas fa-times"></i></button>
            </div>
            <div class="text-xs text-gray-400 mb-4 font-medium" id="done-modal-desc"></div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-500 font-bold ml-1 block mb-1">Gerçekte Çözülen Soru</label>
                    <input type="number" id="done-q" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 text-white">
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold ml-1 block mb-1">Harcanan Süre (Dakika)</label>
                    <input type="number" id="done-min" placeholder="Örn: 45" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 text-white">
                </div>
                <button onclick="confirmDoneTask()" class="w-full py-4 bg-green-600 hover:bg-green-700 rounded-2xl font-bold text-white transition mt-2 shadow-xl shadow-green-900/30"><i class="fas fa-check-double mr-2"></i> Performansa İşle</button>
            </div>
        </div>
    </div>

    <div id="exam-analysis-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center bg-black/70 backdrop-blur-md px-4">
        <div class="w-full max-w-xl glass p-8 rounded-3xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg max-h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-3">
                <h3 class="font-bold text-xl text-blue-400"><i class="fas fa-microscope mr-2"></i> Deneme Hata Analizi</h3>
                <button onclick="closeExamAnalysisModal()" class="text-gray-400 hover:text-white w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-800 transition"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex gap-3 mb-4">
                <select id="ea-ders" onchange="updateEAModalSubj()" class="w-1/2 bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm text-white"></select>
                <select id="ea-konu" class="w-1/2 bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm text-white"></select>
            </div>
            <button onclick="addExamTopic('Yanlış/Boş')" class="w-full mb-4 py-3 bg-red-600/20 text-red-500 border border-red-500/30 hover:bg-red-600 hover:text-white rounded-xl transition text-sm font-bold shadow-lg"><i class="fas fa-plus mr-1"></i> Eksiği Manuel Ekle</button>
            
            <div id="ea-list" class="flex-1 overflow-y-auto space-y-4 hide-scroll bg-black/20 p-4 rounded-2xl border border-gray-800"></div>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT KODLARI ---
        function formatDateNumeric(d) { return String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + d.getFullYear(); }

        const tytAytKonulari = {
            "TYT": {
                "Türkçe": ["Sözcükte Anlam", "Cümlede Anlam", "Paragraf", "Ses Bilgisi", "Yazım Kuralları", "Noktalama İşaretleri", "Sözcük Türleri (İsim, Sıfat, Zamir, Zarf, Edat...)", "Sözcükte Yapı", "Fiiller ve Fiilimsiler", "Cümlenin Ögeleri", "Cümle Türleri", "Anlatım Bozuklukları"],
                "Matematik": ["Temel Kavramlar", "Sayı Basamakları", "Bölünebilme", "EBOB-EKOK", "Rasyonel Sayılar", "Basit Eşitsizlikler", "Mutlak Değer", "Üslü Sayılar", "Köklü Sayılar", "Çarpanlara Ayırma", "Oran-Orantı", "Denklem Çözme", "Sayı-Kesir Problemleri", "Yaş Problemleri", "Yüzde-Kar-Zarar Problemleri", "Hız Problemleri", "İşçi-Havuz Problemleri", "Karışım-Grafik Problemleri", "Kümeler", "Mantık", "Fonksiyonlar", "Permütasyon-Kombinasyon", "Olasılık", "Veri-İstatistik"],
                "Geometri": ["Doğruda ve Üçgende Açılar", "Dik Üçgen", "İkizkenar-Eşkenar Üçgen", "Benzerlik", "Üçgende Alan", "Açıortay-Kenarortay", "Çokgenler ve Dörtgenler", "Yamuk-Paralelkenar-Dikdörtgen-Kare", "Çember ve Daire", "Katı Cisimler", "Analitik Geometri"],
                "Fizik": ["Fizik Bilimine Giriş", "Madde ve Özellikleri", "Hareket ve Kuvvet", "İş-Güç-Enerji", "Isı ve Sıcaklık", "Elektrostatik", "Elektrik Akımı", "Basınç ve Kaldırma Kuvveti", "Dalgalar", "Optik"],
                "Kimya": ["Kimya Bilimi", "Atom ve Periyodik Sistem", "Kimyasal Türler Arası Etkileşimler", "Maddenin Halleri", "Doğa ve Kimya", "Kimyanın Temel Kanunları", "Karışımlar", "Asitler-Bazlar-Tuzlar", "Kimya Her Yerde"],
                "Biyoloji": ["Canlıların Ortak Özellikleri", "Hücre", "İnorganik ve Organik Bileşikler", "Sınıflandırma", "Mitoz ve Eşeysiz Üreme", "Mayoz ve Eşeyli Üreme", "Kalıtım", "Ekosistem Ekolojisi"]
            },
            "AYT": {
                "Matematik": ["İkinci Dereceden Denklemler ve Eşitsizlikler", "Parabol", "Karmaşık Sayılar", "Polinomlar", "Logaritma", "Diziler (Aritmetik/Geometrik)", "Trigonometri (Yarım Açı ve Denklemler)", "Limit ve Süreklilik", "Türev Alma Kuralları", "Türevin Uygulamaları (Max-Min)", "Belirsiz İntegral", "Belirli İntegral ve Alan Hesabı"],
                "Fizik": ["Vektörler ve Bağıl Hareket", "Newton'un Hareket Yasaları", "Atışlar", "İtme ve Momentum", "Tork-Denge ve Ağırlık Merkezi", "Basit Makineler", "Elektriksel Kuvvet ve Potansiyel", "Paralel Levhalar ve Sığa", "Manyetizma ve Elektromanyetik İndüklenme", "Alternatif Akım ve Transformatörler", "Çembersel Hareket ve Açısal Momentum", "Kütle Çekimi ve Kepler Yasaları", "Basit Harmonik Hareket", "Dalga Mekaniği (Girişim-Kırınım)", "Atom Modelleri ve Büyük Patlama", "Radyoaktivite", "Özel Görelilik", "Modern Fiziğin Teknolojideki Uygulamaları"],
                "Kimya": ["Kuantum Atom Modeli", "Periyodik Özellikler", "Gazlar", "Sıvı Çözeltiler ve Koligatif Özellikler", "Kimyasal Tepkimelerde Enerji", "Kimyasal Tepkimelerde Hız", "Kimyasal Denge (Kc-Kp)", "Sulu Çözelti Dengeleri (Asit-Baz)", "Çözünürlük Dengesi (Kçç)", "Redoks ve Aktiflik", "Elektrotlar ve Piller", "Elektroliz", "Hibritleşme ve Molekül Geometrisi", "Alkanlar", "Alkenler", "Alkinler", "Aromatik Bileşikler", "Alkoller ve Eterler", "Aldehitler ve Ketonlar", "Karboksilik Asitler ve Esterler"],
                "Biyoloji": ["Denetleyici ve Düzenleyici Sistemler (Sinir Sistemi)", "Endokrin Bezler ve Hormonlar", "Duyu Organları", "Destek ve Hareket Sistemi", "Sindirim Sistemi", "Dolaşım Sistemi (Kalp ve Damarlar)", "Bağışıklık Sistemi", "Solunum Sistemi", "Boşaltım Sistemi (Üriner Sistem)", "Üreme Sistemi", "Embriyonik Gelişim", "Komünite ve Popülasyon Ekolojisi", "Nükleik Asitlerin Yapısı (DNA/RNA)", "DNA Replikasyonu", "Genden Proteine (Protein Sentezi)", "Genetik Mühendisliği ve Biyoteknoloji", "Fotosentez ve Kemosentez", "Hücresel Solunum", "Bitkilerin Yapısı ve Bitkisel Dokular", "Bitkilerde Büyüme ve Hareket (Tropizma/Nasti)", "Bitkilerde Hormonlar", "Bitkilerde Taşıma (Odun/Soymuk Boruları)", "Bitkilerde Beslenme", "Bitkilerde Eşeyli Üreme (Tohum ve Meyve Oluşumu)"]
            }
        };

        let appData = {
            user: { firstName: '', lastName: '', schoolName: '', schoolNo: '', grade: '', branch: '', phone: '', photo: '' },
            tasks: [], subjects: {}, studyDates: {}, performance: { totalMinutes: 0, totalQuestions: 0, history: [] },
            exams: [], stopwatch: { running: false, startTime: null, elapsed: 0, lastLapElapsed: 0 }, activeLaps: []
        };
        let taskToCompleteId = null;

        window.onload = () => {
            try {
                const saved = localStorage.getItem('yks_analiz_data');
                if (saved) {
                    let parsed = JSON.parse(saved);
                    appData.user = { ...appData.user, ...(parsed.user || {}) };
                    appData.tasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
                    appData.subjects = parsed.subjects || {};
                    appData.studyDates = parsed.studyDates || {};
                    if(parsed.performance) {
                        appData.performance.totalMinutes = parsed.performance.totalMinutes || 0;
                        appData.performance.totalQuestions = parsed.performance.totalQuestions || 0;
                        appData.performance.history = Array.isArray(parsed.performance.history) ? parsed.performance.history : [];
                    }
                    appData.exams = Array.isArray(parsed.exams) ? parsed.exams : [];
                    appData.activeLaps = Array.isArray(parsed.activeLaps) ? parsed.activeLaps : [];
                }
            } catch(e) { console.error("Veri onarımı yapıldı.", e); }

            document.getElementById('current-date-header').innerText = formatDateNumeric(new Date());
            
            let ops = '<option value="">Ders Seç...</option>';
            Object.keys(tytAytKonulari.TYT).forEach(d => ops += `<option value="TYT-${d}">TYT ${d}</option>`);
            Object.keys(tytAytKonulari.AYT).forEach(d => ops += `<option value="AYT-${d}">AYT ${d}</option>`);
            document.getElementById('modal-ders').innerHTML = ops; document.getElementById('ea-ders').innerHTML = ops;

            const hasSession = localStorage.getItem('yks_session') === 'true' || sessionStorage.getItem('yks_session') === 'true';
            
            if (hasSession && appData.user.schoolNo) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initApp();
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
                showAuthTab(appData.user.schoolNo ? 'login' : 'register');
            }
        };

        function showAuthTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
            document.getElementById('tab-login').className = isLogin ? 'flex-1 py-2.5 font-bold rounded-xl bg-blue-600 text-white shadow-lg' : 'flex-1 py-2.5 font-bold rounded-xl text-gray-400 hover:text-white';
            document.getElementById('tab-register').className = !isLogin ? 'flex-1 py-2.5 font-bold rounded-xl bg-blue-600 text-white shadow-lg' : 'flex-1 py-2.5 font-bold rounded-xl text-gray-400 hover:text-white';
        }

        function handleLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('login-phone').value; const no = document.getElementById('login-no').value;
            if (appData.user.phone === phone && appData.user.schoolNo === no) {
                if(document.getElementById('remember-me').checked) localStorage.setItem('yks_session', 'true'); else sessionStorage.setItem('yks_session', 'true');
                document.getElementById('login-overlay').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden');
                initApp(); showToast("Başarıyla girildi!", "success");
            } else showToast("Kimlik bilgileri hatalı!", "error");
        }

        function handleRegister(e) {
            e.preventDefault();
            appData.user = { 
                firstName: document.getElementById('reg-firstName').value, lastName: document.getElementById('reg-lastName').value, 
                schoolName: document.getElementById('reg-schoolName').value, schoolNo: document.getElementById('reg-schoolNo').value, 
                grade: document.getElementById('reg-grade').value, branch: document.getElementById('reg-branch').value, 
                phone: document.getElementById('reg-phone-input').value 
            };

            const icon = type === "success" ? "fa-check-circle" : (type === "error" ? "fa-times-circle" : "fa-exclamation-triangle");
            toast.className = `${color} text-white px-4 py-3 rounded-xl shadow-lg animate-in slide-in-from-right-8 duration-300 flex items-center gap-3`;

        let currentWeekOffset = 0; let currentTaskDate = ''; let currentTaskDayName = '';
        function getWeekDates(offset = 0) {
            const curr = new Date(); const first = curr.getDate() - curr.getDay() + (curr.getDay() === 0 ? -6 : 1) + (offset * 7);
            let monday = new Date(curr.setDate(first));
            const daysArr = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi']; let week = [];
            for (let i = 0; i < 7; i++) {
                let next = new Date(monday); next.setDate(monday.getDate() + i);
                week.push({ dayName: daysArr[next.getDay()], dateStr: formatDateNumeric(next) });
            } return week;
        }

        function renderProgram(el) {
            const weekDates = getWeekDates(currentWeekOffset);
            let html = `<div class="flex justify-between items-center mb-6 glass p-4 rounded-2xl sticky top-0 z-10 bg-brand-bg/90 backdrop-blur"><button onclick="currentWeekOffset--; renderProgram(document.getElementById('view-container'))" class="w-10 h-10 bg-gray-800 hover:bg-blue-600 rounded-xl transition flex items-center justify-center text-white shadow-lg"><i class="fas fa-chevron-left"></i></button><div class="text-center"><h3 class="font-bold text-blue-400 text-lg">${currentWeekOffset===0?'Bu Hafta':(currentWeekOffset<0?'Geçmiş Planlar':'Gelecek Planlar')}</h3><p class="text-[10px] text-gray-500 font-mono tracking-widest mt-0.5">${weekDates[0].dateStr} - ${weekDates[6].dateStr}</p></div><button onclick="currentWeekOffset++; renderProgram(document.getElementById('view-container'))" class="w-10 h-10 bg-gray-800 hover:bg-blue-600 rounded-xl transition flex items-center justify-center text-white shadow-lg"><i class="fas fa-chevron-right"></i></button></div><div class="flex gap-5 overflow-x-auto h-[calc(100%-100px)] snap-x pb-6 hide-scroll items-start">`;
            
            weekDates.forEach(dayObj => {
                html += `<div class="min-w-[300px] w-[300px] shrink-0 snap-center glass rounded-3xl p-5 flex flex-col h-full max-h-[calc(100vh-250px)] border border-gray-800/40"><div class="flex justify-between items-center mb-4 border-b border-gray-800/50 pb-3"><h3 class="font-bold text-white flex flex-col"><span>${dayObj.dayName}</span><span class="text-[10px] text-gray-500 font-mono mt-0.5 tracking-tighter">${dayObj.dateStr}</span></h3><span class="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20" id="count-${dayObj.dateStr}">0 GÖREV</span></div><div id="tasks-${dayObj.dateStr}" class="flex-1 overflow-y-auto space-y-4 pr-1 min-h-[120px] hide-scroll"></div><button onclick="currentTaskDate='${dayObj.dateStr}'; currentTaskDayName='${dayObj.dayName}'; document.getElementById('task-modal').classList.remove('hidden'); populateSuggestions();" class="mt-4 w-full py-4 bg-blue-600/10 text-blue-500 hover:bg-blue-600 hover:text-white rounded-2xl font-bold transition border-2 border-dashed border-blue-500/30 flex items-center justify-center gap-2 group"><i class="fas fa-plus group-hover:scale-125 transition"></i> Yeni Hedef Ekle</button></div>`;
            }); el.innerHTML = html + `</div>`;
            
            let counts = {}; weekDates.forEach(d => counts[d.dateStr] = 0);
            appData.tasks.forEach(t => {
                const container = document.getElementById(`tasks-${t.date}`); if(!container) return; counts[t.date]++; const isDone = t.status === 'done';
                container.innerHTML = `<div class="p-4 bg-gray-800/60 rounded-2xl border border-gray-700 ${isDone?'opacity-40 grayscale':''} transition relative group shadow-sm"><div class="flex justify-between items-start mb-2"><div class="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-2 py-0.5 rounded border border-blue-500/20 uppercase tracking-tighter">${t.ders}</div><div class="text-[10px] font-bold text-white bg-black/30 px-2 py-0.5 rounded">${t.q} SORU</div></div><div class="text-sm font-semibold text-gray-200 leading-tight mb-4">${t.konu}</div><div class="flex justify-end gap-2 border-t border-gray-700/50 pt-3">${!isDone?`<button onclick="openDoneModal(${t.id})" class="w-10 h-10 rounded-xl bg-green-600/20 text-green-500 hover:bg-green-600 hover:text-white flex items-center justify-center transition shadow-lg shadow-green-900/10"><i class="fas fa-check"></i></button>`:`<div class="text-xs text-green-500 font-bold mr-auto flex items-center gap-1"><i class="fas fa-check-double"></i> BİTTİ</div>`}<button onclick="appData.tasks=appData.tasks.filter(x=>x.id!==${t.id});save();renderProgram(document.getElementById('view-container'));" class="w-10 h-10 rounded-xl bg-red-900/20 text-red-500 hover:bg-red-600 hover:text-white flex items-center justify-center transition opacity-100 sm:opacity-0 group-hover:opacity-100"><i class="fas fa-trash-alt text-xs"></i></button></div></div>` + container.innerHTML;
            });
            weekDates.forEach(d => { if(document.getElementById(`count-${d.dateStr}`)) document.getElementById(`count-${d.dateStr}`).innerText = counts[d.dateStr] + ' GÖREV'; });
        }

        function populateSuggestions() {
            let suggestions = []; const now = Date.now();
            for(let konuAdi in appData.studyDates) {
                const days = Math.floor((now - appData.studyDates[konuAdi])/(1000*60*60*24));
                if(days === 3 || days === 7 || days === 30) suggestions.push({ text: konuAdi, type: 'Eğri Tekrarı', color: 'yellow' });
            }
            appData.exams.forEach(e => {
                if(e.topics && Array.isArray(e.topics)) {
                    e.topics.forEach(t => { if(t && t.status && (t.status.includes('Yanlış') || t.status.includes('Boş') || t.status.includes('Hatalı'))) { if(!suggestions.find(s => s.text === t.name)) suggestions.push({ text: t.name, type: 'Deneme Eksiği', color: 'red' }); } });
                }
            });
            const c = document.getElementById('smart-suggestions');
            if(suggestions.length === 0) c.innerHTML = '<span class="text-[10px] text-gray-500">Şu an öneri yok.</span>';
            else c.innerHTML = suggestions.slice(0, 15).map(s => `<button type="button" onclick="autoFillTask('${s.text.replace(/'/g,"\\'")}')" class="text-[9px] px-2 py-1.5 rounded-lg bg-${s.color}-500/10 text-${s.color}-400 border border-${s.color}-500/20 hover:bg-${s.color}-500 hover:text-white transition font-bold"><i class="fas fa-robot mr-1"></i> ${s.text}</button>`).join('');
        }

        function autoFillTask(konuName) {
            let foundDers = ""; let exactKonu = ""; const search = konuName.toLowerCase().substring(0,10); 
            for(let ex in tytAytKonulari) {
                for(let d in tytAytKonulari[ex]) {
                    for(let k of tytAytKonulari[ex][d]) { if(k.toLowerCase().includes(search) || search.includes(k.toLowerCase().substring(0,10))) { foundDers = `${ex}-${d}`; exactKonu = k; break; } }
                    if(foundDers) break;
                } if(foundDers) break;
            }
            if(foundDers) { document.getElementById('modal-ders').value = foundDers; updateModalSubj(); document.getElementById('modal-konu').value = exactKonu; showToast("Asistan doldurdu!", "success"); }
            else showToast("Konu müfredat adıyla tam eşleşmedi.", "warning");
        }

        function updateModalSubj() { const val = document.getElementById('modal-ders').value; if(!val) return; const [ex, d] = val.split('-'); document.getElementById('modal-konu').innerHTML = tytAytKonulari[ex][d].map(k=>`<option value="${k}">${k}</option>`).join(''); }
        function saveTaskModal() {
            const d = document.getElementById('modal-ders').value, k = document.getElementById('modal-konu').value, q = document.getElementById('modal-q').value; if(!d || !k) return showToast("Ders seçimi zorunlu!", "error");
            appData.tasks.push({ id: Date.now(), date: currentTaskDate, day: currentTaskDayName, ders: d.replace('-',' '), konu: k, q: parseInt(q)||0, status: 'pending' });
            save(); document.getElementById('task-modal').classList.add('hidden'); renderProgram(document.getElementById('view-container')); showToast("Görevin eklendi!", "success");
        }

        function openDoneModal(id) {
            taskToCompleteId = id; const t = appData.tasks.find(x=>x.id===id); if(!t) return;
            document.getElementById('done-modal-desc').innerHTML = `<span class="text-blue-400 font-bold">${t.ders}</span> - ${t.konu}`;
            document.getElementById('done-q').value = t.q; document.getElementById('done-min').value = ""; document.getElementById('done-task-modal').classList.remove('hidden');
        }

        function confirmDoneTask() {
            if(!taskToCompleteId) return; const t = appData.tasks.find(x=>x.id===taskToCompleteId); if(!t) return;
            const q = parseInt(document.getElementById('done-q').value) || 0; const m = parseInt(document.getElementById('done-min').value) || 0;
            t.status = 'done'; appData.performance.totalQuestions += q; appData.performance.totalMinutes += m;
            appData.performance.history.push({ id: Date.now(), date: formatDateNumeric(new Date()), mins: m, qs: q, subject: t.konu });
            appData.studyDates[t.konu] = Date.now(); save(); 
            document.getElementById('done-task-modal').classList.add('hidden'); renderProgram(document.getElementById('view-container')); showToast("Performansa işlendi!", "success");
        }

        // --- KRONOMETRE VE GÖREV BAĞLANTISI ---
        let swInt;
        function renderKronometre(el) {
            el.innerHTML = `<div class="grid lg:grid-cols-3 gap-8 h-full pb-10"><div class="lg:col-span-2 flex flex-col items-center justify-center py-12 glass rounded-3xl h-fit border border-gray-700/30"><div id="sw-display" class="text-7xl md:text-[9rem] font-mono font-bold mb-12 text-blue-500 drop-shadow-[0_0_25px_rgba(59,130,246,0.3)] tracking-tighter">00:00:00</div><div class="flex flex-wrap justify-center gap-4"><button id="sw-start-btn" onclick="toggleSW()" class="px-10 py-5 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-bold text-xl shadow-xl shadow-green-900/30 transition hover:scale-105 active:scale-95">BAŞLAT</button><button onclick="lapSW()" class="px-10 py-5 bg-yellow-600 hover:bg-yellow-700 text-white rounded-2xl font-bold text-xl shadow-xl shadow-yellow-900/30 transition hover:scale-105 active:scale-95">TUR KAYDET</button><button onclick="resetSW()" class="px-10 py-5 bg-gray-800 hover:bg-gray-700 rounded-2xl font-bold text-xl border border-gray-700 transition">SIFIRLA</button></div></div><div class="glass p-8 rounded-3xl flex flex-col max-h-[550px]"><h3 class="font-bold text-blue-400 border-b border-gray-700 pb-3 mb-5 flex justify-between items-center text-lg"><span><i class="fas fa-flag-checkered mr-2"></i>Aktif Turlar</span></h3><div id="laps-list" class="flex-1 overflow-y-auto space-y-4 pr-1 hide-scroll"></div></div></div>`;
            updateSW(); renderLaps();
        }

        function toggleSW() {
            if(!appData.stopwatch.running) {
                appData.stopwatch.running = true; appData.stopwatch.startTime = Date.now() - appData.stopwatch.elapsed;
                swInt = setInterval(updateSW, 1000); document.getElementById('sw-start-btn').innerText = 'DURDUR'; document.getElementById('sw-start-btn').className = 'px-10 py-5 bg-red-600 rounded-2xl font-bold text-xl shadow-xl transition hover:bg-red-700';
            } else { appData.stopwatch.running = false; clearInterval(swInt); document.getElementById('sw-start-btn').innerText = 'DEVAM ET'; document.getElementById('sw-start-btn').className = 'px-10 py-5 bg-green-600 rounded-2xl font-bold text-xl shadow-xl transition hover:bg-green-700'; } save();
        }

        function updateSW() {
            if(appData.stopwatch.running) appData.stopwatch.elapsed = Date.now() - appData.stopwatch.startTime;
            const s = Math.floor(appData.stopwatch.elapsed/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
            const str = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            if(document.getElementById('sw-display')) document.getElementById('sw-display').innerText = str;
            const b = document.getElementById('timer-badge');
            if(appData.stopwatch.running) { b.innerText = str; b.classList.remove('hidden'); } else b.classList.add('hidden');
        }

        function lapSW() {
            if(!appData.stopwatch.running && appData.stopwatch.elapsed === 0) return;
            const cur = appData.stopwatch.running ? (Date.now() - appData.stopwatch.startTime) : appData.stopwatch.elapsed;
            const lapElapsed = cur - (appData.stopwatch.lastLapElapsed || 0); appData.stopwatch.lastLapElapsed = cur;
            const s = Math.floor(lapElapsed/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
            appData.activeLaps.unshift({ id: Date.now(), timeStr: `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`, mins: Math.floor(lapElapsed/60000), type: 'extra' });
            save(); renderLaps();
        }

        function toggleLapType(id) {
            const val = document.getElementById(`lap-type-select-${id}`).value;
            const lap = appData.activeLaps.find(l=>l.id===id); if(lap) lap.type = val;
            if(val === 'program') { document.getElementById(`lap-extra-div-${id}`).classList.add('hidden'); document.getElementById(`lap-prog-div-${id}`).classList.remove('hidden'); }

            c.innerHTML = appData.activeLaps.map((lap, i) => `
                <div class="p-4 bg-gray-800/80 rounded-2xl border border-gray-700 animate-in slide-in-from-right-4">
                    <div class="flex justify-between items-center mb-3"><span class="font-bold text-blue-400 text-xs uppercase tracking-tighter">Tur ${appData.activeLaps.length - i}</span><span class="font-mono text-xs bg-black/40 px-3 py-1 rounded-full text-white">${lap.timeStr}</span></div>

                    <div id="lap-extra-div-${lap.id}" class="${lap.type==='program'?'hidden':''}">
                        <input type="text" id="lap-subj-${lap.id}" placeholder="Konu başlığı nedir?" class="w-full bg-black/40 p-3 rounded-xl text-xs border border-gray-700 mb-3 outline-none text-white focus:border-blue-500">
                    </div>
                    <div id="lap-prog-div-${lap.id}" class="${lap.type==='program'?'':'hidden'} mb-3">
                        <select id="lap-prog-task-${lap.id}" class="w-full bg-black/40 p-3 rounded-xl text-xs border border-gray-700 outline-none text-white focus:border-blue-500">${progOptions}</select>
                    </div>
                    <div class="flex gap-2"><input type="number" id="lap-q-${lap.id}" placeholder="Kaç soru?" class="w-full bg-black/40 p-3 rounded-xl text-xs border border-gray-700 outline-none text-white"><button onclick="saveLap(${lap.id})" class="bg-blue-600 hover:bg-blue-700 text-white px-5 rounded-xl text-xs font-black transition">İŞLE</button></div>
                </div>
            `).join('');
        }

        function saveLap(id) {
            const idx = appData.activeLaps.findIndex(l => l.id === id); if(idx === -1) return;
            const lap = appData.activeLaps[idx]; let subj = "Genel Ders"; let qs = parseInt(document.getElementById(`lap-q-${id}`).value) || 0;

            if(lap.type === 'program') {
                const taskId = parseInt(document.getElementById(`lap-prog-task-${id}`).value);
                const t = appData.tasks.find(x => x.id === taskId);
                if(!t) { showToast("Programda seçili görev yok!", "error"); return; }
                t.status = 'done'; subj = t.konu;
            } else { subj = document.getElementById(`lap-subj-${id}`).value || 'Genel Ders'; }

            appData.performance.totalMinutes += lap.mins; appData.performance.totalQuestions += qs;
            appData.performance.history.push({ id: Date.now(), date: formatDateNumeric(new Date()), mins: lap.mins, qs, subject: subj });
            if(subj !== 'Genel Ders') appData.studyDates[subj] = Date.now(); 
            appData.activeLaps.splice(idx, 1); save(); renderLaps(); showToast("Başarıyla kaydedildi!", "success");
        }

        function resetSW() { appData.stopwatch = { running: false, startTime: null, elapsed: 0, lastLapElapsed: 0 }; appData.activeLaps = []; clearInterval(swInt); save(); updateSW(); renderLaps(); }

        // --- DENEME ANALİZİ (OTOMATİK SAYISAL/TYT AYRIMI VE EKSİK GRUPLAMA) ---
        let denemeTab = 'list';
        function renderDeneme(el) {
            el.innerHTML = `<div class="flex gap-2 mb-6 p-1.5 bg-gray-800 rounded-2xl w-fit mx-auto md:mx-0"><button onclick="denemeTab='list'; renderDeneme(document.getElementById('view-container'));" class="px-8 py-2.5 rounded-xl text-sm font-bold transition shrink-0 ${denemeTab==='list'?'bg-blue-600 text-white shadow-lg':'text-gray-400 hover:text-white'}">Sınav Arşivi</button><button onclick="denemeTab='chart'; renderDeneme(document.getElementById('view-container'));" class="px-8 py-2.5 rounded-xl text-sm font-bold transition shrink-0 ${denemeTab==='chart'?'bg-blue-600 text-white shadow-lg':'text-gray-400 hover:text-white'}">Gelişim Grafikleri</button></div>${denemeTab==='list'?renderDenemeList():renderDenemeCharts()}`;
            if(denemeTab==='list') renderExams(); else drawCharts();
        }

        function renderDenemeList() {
            return `<div class="grid lg:grid-cols-2 gap-8 pb-12"><div class="glass p-8 rounded-3xl group relative overflow-hidden h-fit border border-blue-500/10"><div class="absolute inset-0 bg-blue-600/5 group-hover:bg-blue-600/10 transition pointer-events-none"></div><h3 class="font-bold mb-3 text-white flex items-center gap-3 text-lg"><i class="fas fa-robot text-blue-500"></i> Akıllı Optik Tarayıcı</h3><p class="text-xs text-gray-400 mb-6 leading-relaxed">PDF karnelerini toplu olarak yükleyin. Sistem deneme ismini, TYT/AYT ayrımını ve konu bazlı hatalarını anında analiz eder.</p><div class="mb-6"><label class="text-[10px] font-bold text-gray-500 block mb-2 uppercase tracking-widest">Analiz Modu:</label><select id="exam-alan" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 text-sm outline-none text-white font-bold"><option value="SAY">Sayısal Mod (AYT Mat + Fen Oku, TYT Hepsini Oku)</option><option value="TUM">Normal Mod (Tüm Dersleri Oku)</option></select></div><label class="w-full py-12 border-2 border-dashed border-gray-700 hover:border-blue-500/50 rounded-3xl flex flex-col items-center justify-center cursor-pointer transition bg-black/20 group/upload"><i class="fas fa-file-pdf text-5xl text-gray-600 mb-4 group-hover/upload:text-blue-500 transition"></i><span class="font-bold text-gray-400 group-hover/upload:text-white">PDF Dosyalarını Seç</span><input type="file" accept="application/pdf" multiple class="hidden" onchange="handlePDFUpload(event)"></label><div id="pdf-loading" class="hidden mt-6 text-center text-sm text-blue-400 animate-pulse font-bold"><i class="fas fa-spinner fa-spin mr-2"></i> Analiz Yapılıyor...</div></div><div class="glass p-8 rounded-3xl flex flex-col h-fit"><h3 class="font-bold text-white mb-6 border-b border-gray-700 pb-3 flex justify-between items-center text-lg"><span>Kayıtlı Sınavlar</span></h3><div id="exam-list" class="space-y-4 overflow-y-auto flex-1 pr-1 hide-scroll max-h-[600px]"></div></div></div>`;
        }

        async function handlePDFUpload(event) {
            const files = event.target.files; if (!files || files.length === 0) return;
            const alan = document.getElementById('exam-alan').value;
            const loadingEl = document.getElementById('pdf-loading'); loadingEl.classList.remove('hidden');
            let successCount = 0;
            for (let i = 0; i < files.length; i++) {
                if (files[i].type !== "application/pdf") continue;
                loadingEl.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> ${i+1}/${files.length} Dosya İşleniyor...`;
                try {
                    const arrayBuffer = await files[i].arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(new Uint8Array(arrayBuffer)).promise;
                    let fullText = "";
                    for (let p = 1; p <= pdf.numPages; p++) { const page = await pdf.getPage(p); const content = await page.getTextContent(); fullText += content.items.map(it => it.str).join(" ") + " \n"; }
                    const examData = extractDataFromText(fullText, alan);
                    if(examData) { appData.exams.unshift(examData); successCount++; }
                } catch (err) { console.log(err); }
            }
            loadingEl.classList.add('hidden'); event.target.value = ''; 
            if (successCount > 0) { save(); renderExams(); showToast(`${successCount} sınav analiz edildi!`, "success"); } else showToast("Sınav verisi tam okunamadı.", "error");
        }

        function getDersName(code, type) {
            const map = { 'MAT':'Matematik', 'FZK':'Fizik', 'KMY':'Kimya', 'BY':'Biyoloji', 'TURK':'Türkçe', 'SOS':'Sosyal Bilgiler' };
            return `${type} ${map[code] || code}`;
        }

        function extractDataFromText(txt, alan) {
            if(!txt) return null;
            let clean = txt.replace(/\r/g, '').replace(/Α/g, 'A').replace(/Υ/g, 'Y').replace(/Τ/g, 'T').replace(/Μ/g, 'M').replace(/Κ/g, 'K').replace(/Β/g, 'B');
            let lines = clean.split('\n');
            
            let isAYT = false; let isTYT = false;
            // TYT veya AYT olduğunu kesin anlamak için soru sayılarına ve başlık metinlerine bakar
            if(clean.match(/(?:160|166)\s+\d{1,3}\s+\d{1,3}/) || clean.match(/AYT TÜRKİYE/i) || clean.match(/Sayısal\s*:\s*\d+/i)) isAYT = true;
            if(clean.match(/(?:120|125)\s+\d{1,3}\s+\d{1,3}/) || clean.match(/TYT TÜRKİYE/i) || clean.match(/PROFESYONELLER KARMASI/i)) isTYT = true;
            
            let type = isAYT ? 'AYT' : 'TYT';
            if(!isAYT && !isTYT) { if(clean.match(/AYT/i) && !clean.match(/TYT/i)) type = 'AYT'; } 

            let examName = type + " Deneme Sınavı";
            let nameMatch = clean.match(/((?:20\d{2}-20\d{2})[^\n]*)/i);
            if(nameMatch) examName = nameMatch[1].trim().substring(0,50);

            let b = { MAT:{d:0,y:0,t:40}, FZK:{d:0,y:0,t:type==='AYT'?14:7}, KMY:{d:0,y:0,t:type==='AYT'?13:7}, BY:{d:0,y:0,t:type==='AYT'?13:6}, TURK:{d:0,y:0,t:40}, SOS:{d:0,y:0,t:20} };
            let autoTopics = [];
            let dersList = ['MAT', 'FZK', 'KMY', 'BY', 'TRH', 'CGR', 'FLSF', 'DKAB', 'TDE', 'SYLJ', 'PSKL', 'MNTK', 'TARİH', 'COĞRAFYA', 'FELSEFE', 'TÜRKÇE'];

            for(let i=0; i<lines.length; i++) {
                let line = lines[i];
                let hasCode = dersList.some(d => line.includes(`.${d}.`) || line.includes(`${d}.TYT`) || line.includes(`TYT.${d}`) || line.includes(`${d}.AYT`) || line.includes(`AYT.${d}`));
                
                if(hasCode && line.match(/[\d\.]+\s+(.*)/)) {
                    let rawDers = dersList.find(d => line.includes(d));
                    if(!rawDers) continue;

                    let isSAY = ['MAT','FZK','KMY','BY'].includes(rawDers);
                    if (alan === 'SAY' && type === 'AYT' && !isSAY) continue; // SAY modunda AYT ise diğerlerini atla. TYT ise atlama!
                    
                    let dk = rawDers;
                    if(['TRH','CGR','FLSF','DKAB','SYLJ','PSKL','MNTK', 'TARİH', 'COĞRAFYA', 'FELSEFE'].includes(dk)) dk='SOS';
                    if(['TDE','TÜRKÇE','TÜRK', 'TURKCE'].includes(dk)) dk='TURK';

                    let parts = line.split(/[\d\.]+\s+/);
                    let konuRaw = parts.length > 1 ? parts.slice(1).join(' ').trim() : line;

                    let ctx = (lines[i-2]||'') + (lines[i-1]||'') + lines[i] + (lines[i+1]||'') + (lines[i+2]||'');
                    let isCorrect = ctx.includes('+');
                    let isWrong = ctx.includes('-') || /[a-e]/i.test(lines[i].split(/(?:AYT|TYT)/i)[0] || ''); 

                    if(isCorrect) {
                        if(b[dk]) b[dk].d++;
                    } else {
                        if(b[dk]) b[dk].y++; 
                        let st = isWrong ? "Yanlış" : "Boş";
                        let s = konuRaw.replace(/(açıklar|kavrar|çözer|belirler|örnekler verir|analiz eder|fark eder|irdeler|yorumlar|ile ilgili|tespit).*?/gi, '').trim();
                        if(s.endsWith(',')) s = s.slice(0,-1);
                        if(s.length > 3) autoTopics.push({ id: Date.now()+Math.random(), ders: getDersName(dk, type), name: s.substring(0,45), status: st });
                    }
                }
            }

            let matN = b.MAT.d - (b.MAT.y * 0.25), fizN = b.FZK.d - (b.FZK.y * 0.25), kimN = b.KMY.d - (b.KMY.y * 0.25), biyoN = b.BY.d - (b.BY.y * 0.25);
            let turkN = b.TURK.d - (b.TURK.y * 0.25), sosN = b.SOS.d - (b.SOS.y * 0.25), fenN = fizN+kimN+biyoN;
            
            let total = 0;
            // PDF'in genel tablosundan toplam neti okuma yedeği
            const fb = clean.match(/(?:120|125|160|166|80)\s+\d{1,3}\s+\d{1,3}\s+\d{1,3}\s+(\d{1,3}(?:,\d{1,2})?)/);
            if(fb && type==='TYT') total = parseFloat(fb[1].replace(',','.'));
            else total = (type === 'AYT' && alan === 'SAY') ? (matN+fenN) : (matN+fenN+turkN+sosN);

            let grid = `<div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-center text-[10px] bg-black/40 p-4 rounded-2xl mt-4 font-mono">`;
            if(b.MAT.d>0||b.MAT.y>0) grid += `<div><b class="text-blue-400 block mb-1 uppercase">Matematik</b><span class="text-green-400">${b.MAT.d}D</span> <span class="text-red-400">${b.MAT.y}Y</span><br><b class="text-white">${matN}N</b></div>`;
            if(type==='AYT'&&alan==='SAY'){
                grid += `<div><b class="text-blue-400 block mb-1">FİZİK</b><span class="text-green-400">${b.FZK.d}D</span> <span class="text-red-400">${b.FZK.y}Y</span><br><b class="text-white">${fizN}N</b></div>`;
                grid += `<div><b class="text-blue-400 block mb-1">KİMYA</b><span class="text-green-400">${b.KMY.d}D</span> <span class="text-red-400">${b.KMY.y}Y</span><br><b class="text-white">${kimN}N</b></div>`;
                grid += `<div><b class="text-blue-400 block mb-1">BİYOLOJİ</b><span class="text-green-400">${b.BY.d}D</span> <span class="text-red-400">${b.BY.y}Y</span><br><b class="text-white">${biyoN}N</b></div>`;
            } else {
                grid += `<div><b class="text-blue-400 block mb-1">TÜRKÇE</b><span class="text-green-400">${b.TURK.d}D</span> <span class="text-red-400">${b.TURK.y}Y</span><br><b class="text-white">${turkN}N</b></div>`;
                grid += `<div><b class="text-blue-400 block mb-1">FEN BİL.</b><span class="text-green-400">${b.FZK.d+b.KMY.d+b.BY.d}D</span> <span class="text-red-400">${b.FZK.y+b.KMY.y+b.BY.y}Y</span><br><b class="text-white">${fenN}N</b></div>`;
                grid += `<div><b class="text-blue-400 block mb-1">SOSYAL</b><span class="text-green-400">${b.SOS.d}D</span> <span class="text-red-400">${b.SOS.y}Y</span><br><b class="text-white">${sosN}N</b></div>`;
            } grid += `</div>`;

            let uniqueTopics = []; 
            autoTopics.forEach(t => { if(!uniqueTopics.find(x => x.name === t.name && x.ders === t.ders)) uniqueTopics.push(t); });

            if(total <= 0 && uniqueTopics.length === 0) return null;
            return { id: Date.now() + Math.random(), name: examName, date: formatDateNumeric(new Date()), type, net: total, detailsHtml: grid, topics: uniqueTopics, branches: { mat: matN, fiz: fizN, kim: kimN, biyo: biyoN, turk: turkN, sos: sosN, fen: fenN } };
        }

        function renderExams() {
            const c = document.getElementById('exam-list'); if(!c) return;
            if(appData.exams.length === 0) { c.innerHTML = '<div class="text-center p-12 text-gray-500 text-sm opacity-50"><i class="fas fa-file-invoice text-4xl mb-3"></i><br>Deneme kaydı yok.</div>'; return; }

            `).join('');
        }

                    html += `</div></div>`;

        // --- PERFORMANS ---
        function renderPerformans(el) {
            const g = {}; appData.performance.history.forEach(h => { if(!g[h.date]) g[h.date] = {m:0, q:0, i:[]}; g[h.date].m += h.mins; g[h.date].q += h.qs; g[h.date].i.push(h); });
            const sd = Object.keys(g).sort((a,b) => { const [d1,m1,y1]=a.split('.'); const [d2,m2,y2]=b.split('.'); return new Date(`${y2}-${m2}-${d2}`) - new Date(`${y1}-${m1}-${d1}`); });
            el.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10"><div class="glass p-8 rounded-3xl border-t-4 border-blue-500 flex flex-col items-center shadow-xl"><div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Çalışılan Süre</div><div class="text-3xl font-black text-white">${Math.floor(appData.performance.totalMinutes/60)}<span class="text-blue-500 text-lg">sa</span> ${appData.performance.totalMinutes%60}<span class="text-blue-500 text-lg">dk</span></div></div><div class="glass p-8 rounded-3xl border-t-4 border-green-500 flex flex-col items-center shadow-xl"><div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Çözülen Soru</div><div class="text-3xl font-black text-white">${appData.performance.totalQuestions} <span class="text-green-500 text-lg">ADET</span></div></div><div class="glass p-8 rounded-3xl border-t-4 border-orange-500 flex flex-col items-center shadow-xl"><div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Eksik Konu Sayısı</div><div class="text-3xl font-black text-white">${appData.exams.reduce((a,b)=>a+(b.topics?b.topics.length:0),0)}</div></div></div><div class="glass p-8 rounded-3xl pb-12 border border-gray-800/40"><h3 class="font-black text-white mb-8 text-xl flex items-center gap-3 uppercase tracking-tighter"><i class="fas fa-history text-blue-500"></i> Günlük Çalışma Raporu</h3><div class="space-y-12">${sd.length===0?'<p class="text-gray-500 text-sm text-center py-24 opacity-50">Henüz bir çalışma verisi girmediniz.</p>':sd.map(date => `<div class="relative"><div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-3"><h4 class="font-black text-white text-md flex items-center gap-3"><i class="fas fa-calendar-check text-blue-500"></i> ${date}</h4><span class="text-[10px] font-black text-blue-400 bg-blue-500/10 px-4 py-2 rounded-full border border-blue-500/20">${g[date].q} SORU | ${g[date].m} DK</span></div><div class="grid grid-cols-1 gap-4">${g[date].i.reverse().map(i => `<div class="flex justify-between items-center p-6 bg-white/5 rounded-[2rem] border border-transparent hover:border-gray-800 hover:bg-white/[0.03] transition group shadow-sm"><div class="flex flex-col"><span class="text-sm font-black text-gray-100 uppercase tracking-tight">${i.subject}</span><span class="text-[10px] text-gray-500 font-black mt-1 uppercase tracking-widest">${i.mins>0?i.mins+' DK - ':''}${i.qs} SORU ÇÖZÜLDÜ</span></div><button onclick="const idx=appData.performance.history.findIndex(x=>x.id===${i.id}); if(idx>-1){ appData.performance.totalQuestions-=appData.performance.history[idx].qs; appData.performance.totalMinutes-=appData.performance.history[idx].mins; appData.performance.history.splice(idx,1); save(); renderPerformans(document.getElementById('view-container')); showToast('Silindi!','success'); }" class="w-12 h-12 rounded-2xl bg-red-900/20 text-red-500 hover:bg-red-600 hover:text-white flex items-center justify-center transition opacity-100 sm:opacity-0 group-hover:opacity-100 shadow-lg"><i class="fas fa-trash-alt"></i></button></div>`).join('')}</div></div>`).join('')}</div></div>`;
        }

        // --- DİNAMİK İLERLEME BARIYLA UNUTMA EĞRİSİ ---
        function renderUnutma(el) {
            const al = []; const now = Date.now();
            for(let k in appData.studyDates) {
                const days = Math.floor((now - appData.studyDates[k])/(1000*60*60*24));
                let target = 0; let base = 0; let phaseText = ""; let colorClass = "blue";
                
                if(days < 3) { target = 3; base = 0; phaseText = "3. Gün Tekrarı Yaklaşıyor"; colorClass = "blue"; }
                else if(days >= 3 && days < 7) { target = 7; base = 3; phaseText = "3. Gün Tekrarı Gerekli!"; colorClass = "yellow"; }
                else if(days >= 7 && days < 30) { target = 30; base = 7; phaseText = "7. Gün Tekrarı Gerekli!"; colorClass = "orange"; }
                else if(days >= 30) { target = 60; base = 30; phaseText = "30. Gün Tekrarı Gerekli!"; colorClass = "red"; }
                
                let progress = Math.min(100, Math.max(0, ((days - base) / (target - base)) * 100));
                al.push({ k, days, target, progress, phaseText, colorClass });
            }
            al.sort((a,b) => b.days - a.days);

            el.innerHTML = `<div class="space-y-6 max-w-2xl mx-auto pb-10"><div class="p-8 bg-blue-600/10 border border-blue-500/30 rounded-[2.5rem] text-sm leading-relaxed flex items-start gap-6 shadow-xl text-gray-300"><i class="fas fa-brain text-5xl text-blue-500"></i><div><span class="font-black text-blue-400 block mb-2 text-lg uppercase tracking-tighter">Kalıcı Hafıza Merkezi</span>Programda işlediğin veya kronometreyle çalıştığın konular süresi gelince burada belirir. Altlarındaki barlardan tekrar vakitlerini takip et.</div></div>${al.length===0?'<div class="text-center p-24 glass rounded-[3rem] text-gray-600 font-black border border-gray-800/40 shadow-inner uppercase tracking-widest"><i class="fas fa-check-circle text-6xl mb-6 opacity-5"></i><br>Tekrar verisi bekleniyor.</div>':al.map(a=>`<div class="glass p-6 rounded-[2rem] border-l-4 border-${a.colorClass}-500 flex flex-col shadow-xl animate-in zoom-in-95 relative bg-black/20"><div class="flex justify-between items-start mb-4"><div class="flex-1 pr-4"><div class="text-[10px] text-${a.colorClass}-400 font-black uppercase tracking-[0.1em] mb-1.5"><i class="fas ${a.colorClass === 'blue' ? 'fa-hourglass-half' : 'fa-exclamation-circle'} mr-1"></i> ${a.phaseText}</div><div class="text-lg font-black text-white tracking-tight uppercase">${a.k}</div></div><button onclick="delete appData.studyDates['${a.k.replace(/'/g,"\\'")}']; save(); renderUnutma(document.getElementById('view-container')); showToast('Tekrar tamamlandı!','success');" class="w-12 h-12 rounded-xl bg-gray-800 border border-gray-700 text-gray-400 hover:bg-green-500 hover:text-white hover:border-green-500 transition shadow-lg flex items-center justify-center text-xl shrink-0"><i class="fas fa-check"></i></button></div><div class="w-full bg-gray-900 rounded-full h-2 overflow-hidden border border-gray-700/50"><div class="bg-${a.colorClass}-500 h-2 rounded-full transition-all duration-500" style="width: ${a.progress}%"></div></div><div class="text-right text-[10px] text-gray-500 font-mono mt-2 font-bold">${a.days}. Gün / Hedef: ${a.target}. Gün</div></div>`).join('')}</div>`;
        }

        // --- AYARLAR ---
        function renderAyarlar(el) {
            el.innerHTML = `<div class="max-w-md mx-auto space-y-8 pb-16"><button onclick="logout()" class="w-full py-6 bg-yellow-600 hover:bg-yellow-700 transition rounded-[2rem] font-black text-white shadow-2xl flex items-center justify-center gap-3 uppercase tracking-widest"><i class="fas fa-sign-out-alt text-xl"></i> GÜVENLİ ÇIKIŞ YAP</button><div class="glass p-10 rounded-[3rem] text-center shadow-2xl border border-gray-800/40"><i class="fas fa-cloud-download-alt text-6xl text-blue-500 mb-8 drop-shadow-[0_0_15px_rgba(59,130,246,0.4)]"></i><h3 class="font-black text-white text-xl mb-3 uppercase tracking-tighter">VERİ YEDEKLEME</h3><p class="text-xs text-gray-500 mb-10 leading-relaxed font-bold tracking-tight">Cihaz değiştirirken verilerini indirip yeni cihazda yüklemelisin.</p><button onclick="exportData()" class="w-full py-5 bg-blue-600 hover:bg-blue-700 transition rounded-2xl font-black text-white shadow-xl shadow-blue-900/30 tracking-widest">YEDEK DOSYASINI İNDİR</button></div><div class="glass p-10 rounded-[3rem] text-center shadow-2xl border border-gray-800/40"><i class="fas fa-cloud-upload-alt text-6xl text-gray-400 mb-8"></i><h3 class="font-black text-white text-xl mb-3 uppercase tracking-tighter">YEDEK YÜKLE</h3><label class="w-full py-5 bg-gray-700 hover:bg-gray-600 transition rounded-2xl font-black text-white shadow-xl flex items-center justify-center cursor-pointer tracking-widest uppercase">DOSYA SEÇ<input type="file" onchange="importData(event)" accept=".json" class="hidden"></label></div><button onclick="if(confirm('Tüm verilerin kalıcı olarak silinecek. Emin misin?')){localStorage.clear();location.reload();}" class="w-full py-6 text-red-500 border-2 border-red-500/20 rounded-[2rem] hover:bg-red-600 hover:text-white transition font-black tracking-[0.2em] uppercase text-xs"><i class="fas fa-skull-crossbones mr-2"></i> Fabrika Ayarlarına Dön</button></div>`;
        }
        function exportData() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(appData)], {type: 'application/json'})); a.download=`yks_yedek_${formatDateNumeric(new Date())}.json`; a.click(); }
        function importData(e) { const r = new FileReader(); r.onload=(ev)=>{ try { appData=JSON.parse(ev.target.result); save(); location.reload(); } catch(err) { showToast("Dosya hatalı!", "error"); } }; r.readAsText(e.target.files[0]); }
    </script>
</body>
</html>
