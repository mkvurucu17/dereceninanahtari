<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YKS Analiz Merkezi | Profesyonel Sınav Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#3b82f6', dark: '#1d4ed8', bg: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s ease; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .sidebar-item.active { @apply bg-blue-600 text-white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .photo-upload-wrapper input[type="file"] { display: none; }
        .photo-upload-wrapper:hover .overlay { display: flex; }
        input, select, textarea { font-size: 16px !important; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-brand-bg text-gray-900 dark:text-gray-100 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-brand-bg px-4">
        <div class="max-w-md w-full glass p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-500 italic">YKS Analiz Merkezi</h1>
                <p class="text-gray-400 mt-2">Geleceğini Verilerle Yönet</p>
            </div>
            <div id="login-selection" class="space-y-4">
                <button onclick="showLoginForm('student')" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition flex items-center justify-center gap-3">
                    <i class="fas fa-user-graduate text-xl"></i> Öğrenci Girişi
                </button>
            </div>
            <form id="student-form" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="schoolName" placeholder="Okul Adı" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                    <input type="text" id="schoolNo" placeholder="Okul No" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="firstName" placeholder="İsim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                    <input type="text" id="lastName" placeholder="Soyisim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="grade" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full">
                        <option>12. Sınıf</option><option>Mezun</option><option>11. Sınıf</option>
                    </select>
                    <input type="text" id="branch" placeholder="Şube (SAY/EA/SÖZ)" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full">
                </div>
                <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold transition">Sistemi Başlat</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 glass border-r border-gray-800 flex flex-col shrink-0 hidden md:flex">
            <div class="p-6 border-b border-gray-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl text-white">Y</div>
                <span class="font-bold text-sm tracking-widest uppercase">Analiz Merkezi</span>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="sidebar-nav"></nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="toggleTheme()" class="w-full p-2 flex items-center justify-center gap-2 hover:bg-gray-800 rounded-lg transition">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    <span>Tema Değiştir</span>
                </button>
            </div>
        </aside>

        <div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-gray-800 flex justify-around p-2 z-40 bg-brand-bg/95" id="mobile-nav"></div>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 relative pb-24 md:pb-8">
            <header class="mb-6 flex justify-between items-center">
                <h2 id="view-title" class="text-2xl md:text-3xl font-bold">Hoş Geldin, <span id="user-display-name">...</span></h2>
                <div id="timer-badge" class="hidden px-4 py-2 bg-red-600/20 text-red-500 rounded-full border border-red-500 animate-pulse font-mono font-bold">00:00:00</div>
            </header>
            <div id="view-container" class="animate-in slide-in-from-bottom-4 duration-500 h-[calc(100%-80px)]"></div>
            <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
        </main>
    </div>

    <script>
        const tytAytKonulari = {
            "TYT": { "Türkçe": ["Paragraf", "Dil Bilgisi"], "Matematik": ["Problemler", "Sayılar"] },
            "AYT": { "Matematik": ["Türev", "İntegral"], "Fizik": ["Mekanik", "Elektrik"] }
        };

        let appData = {
            user: { firstName: '', lastName: '', schoolName: '', schoolNo: '', grade: '', branch: '', photo: '' },
            tasks: [], subjects: {}, performance: { totalMinutes: 0, totalQuestions: 0, history: [] },
            exams: [], stopwatch: { running: false, startTime: null, elapsed: 0 }
        };

        window.onload = () => {
            const saved = localStorage.getItem('yks_analiz_data');
            if (saved) { appData = {...appData, ...JSON.parse(saved)}; initApp(); }
        };

        function showLoginForm(type) { document.getElementById('login-selection').classList.add('hidden'); document.getElementById('student-form').classList.remove('hidden'); }

        document.getElementById('student-form').onsubmit = (e) => {
            e.preventDefault();
            appData.user = {
                firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value,
                schoolName: document.getElementById('schoolName').value, schoolNo: document.getElementById('schoolNo').value,
                grade: document.getElementById('grade').value, branch: document.getElementById('branch').value
            };
            save(); initApp();
        };

        function initApp() {
            document.getElementById('login-overlay').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = appData.user.firstName;
            renderSidebar(); navigate('deneme'); 
        }

        function save() { localStorage.setItem('yks_analiz_data', JSON.stringify(appData)); }

        function showToast(message, type = "warning") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `bg-${type === 'success' ? 'green' : 'blue'}-600 text-white px-4 py-3 rounded-xl shadow-lg animate-in slide-in-from-right-8 duration-300 flex items-center gap-3`;
            toast.innerHTML = `<i class="fas fa-info-circle"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast); setTimeout(() => toast.remove(), 4000);
        }

        const menuItems = [
            { id: 'profil', label: 'Profil', icon: 'fa-user' }, { id: 'program', label: 'Programım', icon: 'fa-calendar-alt' },
            { id: 'kronometre', label: 'Kronometre', icon: 'fa-stopwatch' }, { id: 'deneme', label: 'Deneme Analizi', icon: 'fa-chart-line' },
            { id: 'performans', label: 'Performansım', icon: 'fa-fire' }, { id: 'ayarlar', label: 'Ayarlar', icon: 'fa-cog' }
        ];

        function renderSidebar() {
            document.getElementById('sidebar-nav').innerHTML = menuItems.map(item => `
                <button onclick="navigate('${item.id}')" id="nav-${item.id}" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-gray-400 hover:bg-gray-800">
                    <i class="fas ${item.icon}"></i><span class="font-medium">${item.label}</span>
                </button>
            `).join('');
            document.getElementById('mobile-nav').innerHTML = menuItems.filter(i=>['profil','program','kronometre','deneme'].includes(i.id)).map(item => `
                <button onclick="navigate('${item.id}')" id="mob-nav-${item.id}" class="mobile-sidebar-item flex flex-col items-center p-2 text-gray-400 rounded-lg">
                    <i class="fas ${item.icon} text-xl mb-1"></i><span class="text-[10px] font-medium">${item.label}</span>
                </button>
            `).join('');
        }

        function navigate(id) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active', 'text-white'));
            document.querySelectorAll('.mobile-sidebar-item').forEach(el => el.classList.remove('text-blue-500'));
            if(document.getElementById(`nav-${id}`)) document.getElementById(`nav-${id}`).classList.add('active', 'text-white');
            if(document.getElementById(`mob-nav-${id}`)) document.getElementById(`mob-nav-${id}`).classList.add('text-blue-500');
            
            const container = document.getElementById('view-container');
            document.getElementById('view-title').innerText = menuItems.find(m => m.id === id)?.label || "Panel";

            if(id === 'deneme') renderDeneme(container);
            else if(id === 'program') container.innerHTML = '<div class="p-10 text-center glass rounded-2xl">Programım aktif. Diğer modülleri v3.html\'den alabilirsiniz.</div>';
            else container.innerHTML = `<div class="p-10 text-center glass rounded-2xl">Bu modül yapım aşamasında.</div>`;
        }

        // ==========================================
        // DENEME ANALİZİ (TOPLU PDF & REGEX MODÜLÜ)
        // ==========================================
        function renderDeneme(el) {
            el.innerHTML = `
                <div class="grid lg:grid-cols-2 gap-6 h-full pb-10">
                    <div class="space-y-6 flex flex-col">
                        <div class="glass p-6 rounded-2xl relative overflow-hidden group">
                            <div class="absolute inset-0 bg-blue-600/5 group-hover:bg-blue-600/10 transition pointer-events-none"></div>
                            <h3 class="font-bold mb-2 text-blue-400 flex items-center gap-2"><i class="fas fa-file-pdf"></i> Akıllı Sınav Okuyucu (Toplu Yükleme)</h3>
                            <p class="text-xs text-gray-400 mb-4">Birden fazla sınav sonucunu (PDF) aynı anda seçebilirsin. Hepsini saniyeler içinde okuyup ekler.</p>
                            
                            <label class="w-full py-10 border-2 border-dashed border-gray-600 hover:border-blue-500 rounded-xl flex flex-col items-center justify-center cursor-pointer transition bg-black/20">
                                <i class="fas fa-copy text-4xl text-gray-500 mb-3 group-hover:text-blue-400 transition"></i>
                                <span class="font-bold text-gray-300">PDF Dosyalarını Seç</span>
                                <span class="text-xs text-gray-500 mt-1">Çoklu seçim yapabilirsiniz</span>
                                <input type="file" id="pdf-upload" accept="application/pdf" multiple class="hidden" onchange="handlePDFUpload(event)">
                            </label>
                            
                            <div id="pdf-loading" class="hidden mt-4 text-center text-sm text-blue-400 animate-pulse font-bold">
                                <i class="fas fa-spinner fa-spin mr-2"></i> PDF'ler Okunuyor, lütfen bekle...
                            </div>
                        </div>

                        <div class="glass p-6 rounded-2xl flex-1 flex flex-col">
                            <h3 class="font-bold mb-2 text-gray-300">Metin Olarak Yapıştır</h3>
                            <textarea id="regex-input" class="w-full flex-1 bg-gray-800 p-4 rounded-xl border border-gray-700 text-xs font-mono mb-4 outline-none focus:border-blue-500 transition resize-none hide-scroll" placeholder="Eğer PDF okumada sorun yaşanırsa, metni buraya yapıştırabilirsiniz."></textarea>
                            <button onclick="parseRegex()" class="w-full py-3 bg-gray-700 hover:bg-blue-600 transition shadow-lg rounded-xl font-bold"><i class="fas fa-magic mr-2"></i> Metni Ayrıştır ve Kaydet</button>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-2xl flex flex-col">
                        <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                            <h3 class="font-bold text-blue-400">Sonuç Karnesi Analizleri</h3>
                            <button onclick="clearExams()" class="text-xs text-red-500 hover:text-red-400"><i class="fas fa-trash"></i> Hepsini Sil</button>
                        </div>
                        <div id="exam-list" class="space-y-3 overflow-y-auto flex-1 pr-2 hide-scroll"></div>
                    </div>
                </div>
            `;
            renderExams();
        }

        // PDF JS - TOPLU YÜKLEME (MULTIPLE UPLOAD) ENTEGRASYONU
        async function handlePDFUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const loadingEl = document.getElementById('pdf-loading');
            loadingEl.classList.remove('hidden');
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.type !== "application/pdf") {
                    showToast(`${file.name} PDF formatında değil, atlandı.`, "warning");
                    continue;
                }

                loadingEl.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> ${i+1} / ${files.length} PDF Okunuyor...`;

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const typedarray = new Uint8Array(arrayBuffer);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";

                    for (let p = 1; p <= pdf.numPages; p++) {
                        const page = await pdf.getPage(p);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ") + " \n";
                    }

                    const examData = extractDataFromText(fullText);
                    if(examData) {
                        appData.exams.unshift(examData);
                        successCount++;
                    }

                    if (i === files.length - 1) {
                        document.getElementById('regex-input').value = fullText;
                    }

                } catch (error) {
                    console.error("PDF okuma hatası:", error);
                    showToast(`${file.name} okunamadı.`, "warning");
                }
            }

            loadingEl.classList.add('hidden');
            loadingEl.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> PDF'ler Okunuyor, lütfen bekle...`;
            event.target.value = ''; 
            
            if (successCount > 0) {
                save();
                renderExams();
                showToast(`Harika! ${successCount} adet sınav başarıyla eklendi.`, "success");
            } else {
                showToast("Sınav verisi tespit edilemedi.", "warning");
            }
        }

        function extractDataFromText(txt) {
            if(!txt) return null;

            const sayisalMatch = txt.match(/Sayısal\s*:\s*([\d\.]+)/i);
            const puan = sayisalMatch ? sayisalMatch[1] : "Puan Bulunamadı";

            const parseNet = (keyword) => {
                const reg1 = new RegExp(`Net:\\s*(\\d+(?:,\\d+)?)\\s*${keyword}`, 'i');
                const reg2 = new RegExp(`(\\d+(?:,\\d+)?)\\s*${keyword}.*?Net`, 'i');
                const reg3 = new RegExp(`${keyword}.*?Net:\\s*(\\d+(?:,\\d+)?)`, 'i');
                const match = txt.match(reg1) || txt.match(reg2) || txt.match(reg3);
                return match ? parseFloat(match[1].replace(',', '.')) : 0;
            };

            const mat = parseNet("MAT[A-ZİŞĞÜÇÖ]*");
            const fen = parseNet("FEN");
            const turk = parseNet("TÜRK[A-ZİŞĞÜÇÖ]*");
            const sos = parseNet("SOSYAL");
            const edebiyat = parseNet("EDEB[İI]YAT");

            let totalNet = mat + fen + turk + sos + edebiyat;
            
            if (totalNet === 0) {
                const fallbackMatch = txt.match(/(\d{2,3})\s+(\d{1,3})\s+(\d{1,3})\s+(\d{1,3})\s+(\d{1,3},\d{2})/);
                if (fallbackMatch) totalNet = parseFloat(fallbackMatch[5].replace(',', '.'));
            }

            let details = [];
            if(mat>0) details.push(`Mat: ${mat}`);
            if(fen>0) details.push(`Fen: ${fen}`);
            if(turk>0) details.push(`Tür: ${turk}`);
            if(sos>0) details.push(`Sos: ${sos}`);
            if(edebiyat>0) details.push(`Edb: ${edebiyat}`);
            
            let detailStr = details.length > 0 ? details.join(' | ') : "Genel Net Okundu";

            return { 
                id: Date.now() + Math.floor(Math.random() * 1000), 
                date: new Date().toLocaleDateString(), 
                net: totalNet, 
                puan: puan,
                details: detailStr 
            };
        }

        function parseRegex() {
            const txt = document.getElementById('regex-input').value;
            if(!txt) return showToast("Ayrıştırılacak metin bulunamadı.", "warning");
            
            const examData = extractDataFromText(txt);
            if(examData) {
                appData.exams.unshift(examData);
                save(); 
                renderExams();
                showToast("Metinden sınav analiz edildi!", "success");
            }
        }
        
        function renderExams() {
            const c = document.getElementById('exam-list');
            if(!c) return;
            if(appData.exams.length === 0) {
                c.innerHTML = '<div class="text-center p-5 text-gray-500 text-sm">Henüz deneme verisi yok. PDF yükleyerek başlayın.</div>';
                return;
            }
            c.innerHTML = appData.exams.map(e => `
                <div class="p-4 bg-gray-800/60 border border-gray-700/50 rounded-xl flex justify-between items-center hover:bg-gray-800 transition">
                    <div>
                        <div class="font-bold text-sm mb-1"><i class="fas fa-file-contract text-blue-500 mr-2"></i>${e.date}</div>
                        <div class="text-xs text-gray-400 bg-black/20 inline-block px-2 py-0.5 rounded">${e.details}</div>
                        ${e.puan !== "Puan Bulunamadı" ? `<div class="text-xs text-orange-400 mt-1 font-bold">Puan: ${e.puan}</div>` : ''}
                    </div>
                    <div class="text-green-400 font-bold text-xl bg-green-900/20 px-3 py-2 rounded-lg">${e.net} Net</div>
                </div>
            `).join('');
        }

        function clearExams() {
            if(confirm("Tüm deneme analizleri silinecek. Emin misiniz?")) {
                appData.exams = [];
                save();
                renderExams();
            }
        }
    </script>
</body>
</html>
