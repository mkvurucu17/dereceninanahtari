<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YKS Analiz Merkezi | Profesyonel Sınav Yönetimi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { light: '#3b82f6', dark: '#1d4ed8', bg: '#0f172a' } } } }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-brand-bg text-gray-900 dark:text-gray-100 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-brand-bg px-4">
        <div class="max-w-md w-full glass p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-500 italic">YKS Analiz Merkezi</h1>
                <p class="text-gray-400 mt-2">Geleceğini Verilerle Yönet</p>
            </div>
            <div id="login-selection" class="space-y-4">
                <button onclick="document.getElementById('login-selection').classList.add('hidden'); document.getElementById('student-form').classList.remove('hidden');" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition flex items-center justify-center gap-3">
                    <i class="fas fa-user-graduate text-xl"></i> Öğrenci Girişi
                </button>
            </div>
            <form id="student-form" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="schoolName" placeholder="Okul Adı" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                    <input type="text" id="schoolNo" placeholder="Okul No" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="firstName" placeholder="İsim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                    <input type="text" id="lastName" placeholder="Soyisim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="grade" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full">
                        <option>12. Sınıf</option><option>Mezun</option><option>11. Sınıf</option>
                    </select>
                    <input type="text" id="branch" placeholder="Şube (SAY/EA/SÖZ)" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full">
                </div>
                <div class="flex items-center gap-2 p-2">
                    <input type="checkbox" id="hasCoach" class="w-5 h-5 accent-blue-600">
                    <label for="hasCoach" class="text-sm">Bir koçum var</label>
                </div>
                <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold transition">Sistemi Başlat</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 glass border-r border-gray-800 flex flex-col shrink-0 hidden md:flex">
            <div class="p-6 border-b border-gray-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl text-white">Y</div>
                <span class="font-bold text-sm tracking-widest uppercase">Analiz Merkezi</span>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="sidebar-nav"></nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="document.documentElement.classList.toggle('dark');" class="w-full p-2 flex items-center justify-center gap-2 hover:bg-gray-800 rounded-lg transition">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    <span>Tema Değiştir</span>
                </button>
            </div>
        </aside>

        <div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-gray-800 grid grid-cols-6 p-1 z-40 bg-brand-bg/95 gap-1" id="mobile-nav"></div>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 relative pb-24 md:pb-8">
            <header class="mb-6 flex justify-between items-center">
                <h2 id="view-title" class="text-2xl md:text-3xl font-bold">Hoş Geldin, <span id="user-display-name">...</span></h2>
                <div id="timer-badge" class="hidden px-4 py-2 bg-red-600/20 text-red-500 rounded-full border border-red-500 animate-pulse font-mono font-bold">00:00:00</div>
            </header>
            <div id="view-container" class="animate-in slide-in-from-bottom-4 duration-500 h-[calc(100%-80px)]"></div>
            <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2"></div>
        </main>
    </div>

    <div id="task-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="w-full max-w-sm glass p-6 rounded-2xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg/90">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-3">
                <h3 class="font-bold text-lg text-blue-400" id="task-modal-title">Görev Ekle</h3>
                <button onclick="document.getElementById('task-modal').classList.add('hidden')" class="text-gray-400 hover:text-white w-8 h-8 rounded-lg hover:bg-gray-800 transition"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-3">
                <select id="modal-ders" onchange="updateModalSubj()" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition"><option value="">Ders Seç...</option></select>
                <select id="modal-konu" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition"><option value="">Önce Ders Seçin</option></select>
                <input type="number" id="modal-q" placeholder="Hedef Soru Sayısı" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition">
                <button onclick="saveTaskModal()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-white transition mt-4">Programa Ekle</button>
            </div>
        </div>
    </div>

    <div id="exam-analysis-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="w-full max-w-md glass p-6 rounded-2xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg/90 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-3">
                <h3 class="font-bold text-lg text-blue-400">Deneme Konu Analizi</h3>
                <button onclick="closeExamAnalysisModal()" class="text-gray-400 hover:text-white w-8 h-8 rounded-lg hover:bg-gray-800 transition"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex gap-2 mb-4">
                <select id="ea-ders" onchange="updateEAModalSubj()" class="w-1/2 bg-gray-800 p-2 rounded-xl border border-gray-700 text-sm outline-none"><option value="">Ders Seç...</option></select>
                <select id="ea-konu" class="w-1/2 bg-gray-800 p-2 rounded-xl border border-gray-700 text-sm outline-none"><option value="">Konu Seç...</option></select>
            </div>
            <button onclick="addExamTopic('Yanlış/Boş')" class="w-full mb-4 py-2 bg-red-600/20 text-red-500 border border-red-500/50 hover:bg-red-600 hover:text-white rounded-lg transition text-sm font-bold"><i class="fas fa-plus mr-1"></i> Manuel Eksik Ekle</button>
            
            <div id="ea-list" class="flex-1 overflow-y-auto space-y-2 border-t border-gray-700 pt-3 hide-scroll min-h-[150px]"></div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
