<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YKS Analiz Merkezi | Profesyonel Sınav Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#3b82f6', dark: '#1d4ed8', bg: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s ease; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .sidebar-item.active { @apply bg-blue-600 text-white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .photo-upload-wrapper input[type="file"] { display: none; }
        .photo-upload-wrapper:hover .overlay { display: flex; }
        input, select, textarea { font-size: 16px !important; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-brand-bg text-gray-900 dark:text-gray-100 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-brand-bg px-4">
        <div class="max-w-md w-full glass p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-500 italic">YKS Analiz Merkezi</h1>
                <p class="text-gray-400 mt-2">Geleceğini Verilerle Yönet</p>
            </div>
            <div id="login-selection" class="space-y-4">
                <button onclick="showLoginForm()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition flex items-center justify-center gap-3">
                    <i class="fas fa-user-graduate text-xl"></i> Öğrenci Girişi
                </button>
            </div>
            <form id="student-form" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="schoolName" placeholder="Okul Adı" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                    <input type="text" id="schoolNo" placeholder="Okul No" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="firstName" placeholder="İsim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                    <input type="text" id="lastName" placeholder="Soyisim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="grade" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full">
                        <option>12. Sınıf</option><option>Mezun</option><option>11. Sınıf</option>
                    </select>
                    <input type="text" id="branch" placeholder="Şube (SAY/EA/SÖZ)" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full">
                </div>
                <div class="flex items-center gap-2 p-2">
                    <input type="checkbox" id="hasCoach" class="w-5 h-5 accent-blue-600">
                    <label for="hasCoach" class="text-sm">Bir koçum var</label>
                </div>
                <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold transition">Sistemi Başlat</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 glass border-r border-gray-800 flex flex-col shrink-0 hidden md:flex">
            <div class="p-6 border-b border-gray-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl text-white">Y</div>
                <span class="font-bold text-sm tracking-widest uppercase">Analiz Merkezi</span>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="sidebar-nav"></nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="toggleTheme()" class="w-full p-2 flex items-center justify-center gap-2 hover:bg-gray-800 rounded-lg transition">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    <span>Tema Değiştir</span>
                </button>
            </div>
        </aside>

        <div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-gray-800 flex justify-around p-2 z-40 bg-brand-bg/95" id="mobile-nav"></div>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 relative pb-24 md:pb-8">
            <header class="mb-6 flex justify-between items-center">
                <h2 id="view-title" class="text-2xl md:text-3xl font-bold">Hoş Geldin, <span id="user-display-name">...</span></h2>
                <div id="timer-badge" class="hidden px-4 py-2 bg-red-600/20 text-red-500 rounded-full border border-red-500 animate-pulse font-mono font-bold">00:00:00</div>
            </header>
            <div id="view-container" class="animate-in slide-in-from-bottom-4 duration-500 h-[calc(100%-80px)]"></div>
            <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
        </main>
    </div>

    <div id="task-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="w-full max-w-sm glass p-6 rounded-2xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg/90">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-3">
                <h3 class="font-bold text-lg text-blue-400" id="task-modal-title">Görev Ekle</h3>
                <button onclick="closeTaskModal()" class="text-gray-400 hover:text-white w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-800 transition"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-3">
                <select id="modal-ders" onchange="updateModalSubj()" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition">
                    <option value="">Ders Seç...</option>
                </select>
                <select id="modal-konu" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition">
                    <option value="">Önce Ders Seçin</option>
                </select>
                <div class="relative">
                    <input type="number" id="modal-q" placeholder="Hedef Soru Sayısı" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition pl-10">
                    <i class="fas fa-bullseye absolute left-3 top-3.5 text-gray-500"></i>
                </div>
                <button onclick="saveTaskModal()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-white transition mt-4 shadow-lg shadow-blue-900/50 flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> Programa Ekle
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- VERİTABANI ---
        const tytAytKonulari = {
            "TYT": {
                "Türkçe": ["Sözcükte Anlam", "Cümlede Anlam", "Paragraf", "Ses Bilgisi", "Yazım Kuralları", "Noktalama İşaretleri", "Sözcük Türleri", "Sözcükte Yapı", "Fiiller ve Fiilimsiler", "Cümlenin Ögeleri", "Cümle Türleri", "Anlatım Bozuklukları"],
                "Matematik": ["Temel Kavramlar", "Sayı Basamakları", "Bölünebilme", "EBOB-EKOK", "Rasyonel Sayılar", "Basit Eşitsizlikler", "Mutlak Değer", "Üslü Sayılar", "Köklü Sayılar", "Çarpanlara Ayırma", "Oran-Orantı", "Denklem Çözme", "Problemler", "Kümeler", "Mantık", "Fonksiyonlar", "Permütasyon-Kombinasyon-Olasılık", "Veri-İstatistik"],
                "Geometri": ["Doğruda ve Üçgende Açılar", "Özel Üçgenler", "Açıortay-Kenarortay", "Benzerlik", "Çokgenler ve Dörtgenler", "Çember ve Daire", "Katı Cisimler", "Analitik Geometri"],
                "Fizik": ["Fizik Bilimine Giriş", "Madde ve Özellikleri", "Hareket ve Kuvvet", "İş, Güç, Enerji", "Isı ve Sıcaklık", "Elektrostatik", "Elektrik ve Manyetizma", "Basınç ve Kaldırma Kuvveti", "Dalgalar", "Optik"],
                "Kimya": ["Kimya Bilimi", "Atom ve Periyodik Sistem", "Kimyasal Türler Arası Etkileşimler", "Maddenin Halleri", "Doğa ve Kimya", "Kimyanın Temel Kanunları ve Hesaplamalar", "Karışımlar", "Asitler, Bazlar ve Tuzlar", "Kimya Her Yerde"],
                "Biyoloji": ["Canlıların Ortak Özellikleri", "İnorganik/Organik Bileşikler", "Hücre", "Canlıların Sınıflandırılması", "Hücre Bölünmeleri", "Kalıtım", "Ekosistem Ekolojisi"]
            },
            "AYT": {
                "Matematik": ["İkinci Dereceden Denklemler", "Karmaşık Sayılar", "Parabol", "Eşitsizlikler", "Polinomlar", "Logaritma", "Diziler", "Trigonometri", "Limit ve Süreklilik", "Türev", "İntegral"],
                "Fizik": ["Vektörler ve Bağıl Hareket", "Newton'un Hareket Yasaları", "Atışlar", "İş, Güç ve Enerji", "İtme ve Momentum", "Tork ve Denge", "Elektriksel Kuvvet ve Potansiyel", "Manyetizma", "Çembersel Hareket", "Basit Harmonik Hareket", "Dalga Mekaniği", "Modern Fizik", "Radyoaktivite"],
                "Kimya": ["Modern Atom Teorisi", "Gazlar", "Sıvı Çözeltiler", "Kimyasal Tepkimelerde Enerji", "Tepkimelerde Hız", "Kimyasal Denge", "Asit-Baz Dengesi", "Kçç", "Elektrokimya", "Karbon Kimyasına Giriş", "Organik Bileşikler"],
                "Biyoloji": ["Sinir Sistemi", "Endokrin Sistem", "Duyu Organları", "Destek ve Hareket Sistemi", "Sindirim Sistemi", "Dolaşım ve Bağışıklık Sistemi", "Solunum Sistemi", "Boşaltım Sistemi", "Üreme Sistemi", "Popülasyon Ekolojisi", "Protein Sentezi", "Fotosentez ve Kemosentez", "Hücresel Solunum", "Bitkisel Dokular ve Organlar", "Bitkilerde Hareket ve Taşıma", "Bitkilerde Üreme"]
            }
        };

        // --- DEVLET YÖNETİMİ ---
        let appData = {
            user: { firstName: '', lastName: '', schoolName: '', schoolNo: '', grade: '', branch: '', hasCoach: false, email: '', phone: '', photo: '' },
            tasks: [],
            subjects: {},
            performance: { totalMinutes: 0, totalQuestions: 0, history: [] },
            exams: [],
            stopwatch: { running: false, startTime: null, elapsed: 0 }
        };

        window.onload = () => {
            const saved = localStorage.getItem('yks_analiz_data');
            if (saved) { appData = {...appData, ...JSON.parse(saved)}; initApp(); }
            
            const dersSelect = document.getElementById('modal-ders');
            let ops = '<option value="">Ders Seç...</option>';
            Object.keys(tytAytKonulari.TYT).forEach(d => ops += `<option value="TYT-${d}">TYT ${d}</option>`);
            Object.keys(tytAytKonulari.AYT).forEach(d => ops += `<option value="AYT-${d}">AYT ${d}</option>`);
            dersSelect.innerHTML = ops;
        };

        function showLoginForm() { 
            document.getElementById('login-selection').classList.add('hidden'); 
            document.getElementById('student-form').classList.remove('hidden'); 
        }

        document.getElementById('student-form').onsubmit = (e) => {
            e.preventDefault();
            appData.user = {
                ...appData.user,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                schoolName: document.getElementById('schoolName').value,
                schoolNo: document.getElementById('schoolNo').value,
                grade: document.getElementById('grade').value,
                branch: document.getElementById('branch').value,
                hasCoach: document.getElementById('hasCoach').checked
            };
            save(); initApp();
        };

        function initApp() {
            document.getElementById('login-overlay').classList.add('hidden'); 
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = appData.user.firstName;
            renderSidebar(); navigate('program'); 
        }

        function save() { localStorage.setItem('yks_analiz_data', JSON.stringify(appData)); }

        function showToast(message, type = "warning") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === "warning" ? "bg-yellow-600" : (type === "error" ? "bg-red-600" : "bg-green-600");
            const icon = type === "success" ? "fa-check-circle" : "fa-exclamation-triangle";
            toast.className = `${color} text-white px-4 py-3 rounded-xl shadow-lg animate-in slide-in-from-right-8 duration-300 flex items-center gap-3`;
            toast.innerHTML = `<i class="fas ${icon}"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast); setTimeout(() => toast.remove(), 4000);
        }

        // --- MENÜ YÖNETİMİ ---
        const menuItems = [
            { id: 'profil', label: 'Profil', icon: 'fa-user' },
            { id: 'program', label: 'Programım', icon: 'fa-calendar-alt' },
            { id: 'unutma', label: 'Unutma Eğrisi', icon: 'fa-brain' },
            { id: 'kronometre', label: 'Kronometre', icon: 'fa-stopwatch' },
            { id: 'konular', label: 'Konularım', icon: 'fa-list-ul' },
            { id: 'deneme', label: 'Deneme Analizi', icon: 'fa-chart-line' },
            { id: 'performans', label: 'Performansım', icon: 'fa-fire' },
            { id: 'ayarlar', label: 'Ayarlar', icon: 'fa-cog' }
        ];

        function renderSidebar() {
            let items = [...menuItems];
            if (appData.user.hasCoach) items.splice(2, 0, { id: 'koc', label: 'Koç', icon: 'fa-user-tie' });
            
            document.getElementById('sidebar-nav').innerHTML = items.map(item => `
                <button onclick="navigate('${item.id}')" id="nav-${item.id}" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-gray-400 hover:bg-gray-800">
                    <i class="fas ${item.icon}"></i><span class="font-medium">${item.label}</span>
                </button>
            `).join('');

            const mobileItems = items.filter(i => ['profil', 'program', 'kronometre', 'deneme', 'ayarlar'].includes(i.id));
            document.getElementById('mobile-nav').innerHTML = mobileItems.map(item => `
                <button onclick="navigate('${item.id}')" id="mob-nav-${item.id}" class="mobile-sidebar-item flex flex-col items-center p-2 text-gray-400 transition rounded-lg">
                    <i class="fas ${item.icon} text-xl mb-1"></i><span class="text-[10px] font-medium">${item.label}</span>
                </button>
            `).join('');
        }

        function navigate(id) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active', 'text-white'));
            document.querySelectorAll('.mobile-sidebar-item').forEach(el => el.classList.remove('text-blue-500'));
            
            if (document.getElementById(`nav-${id}`)) document.getElementById(`nav-${id}`).classList.add('active', 'text-white');
            if (document.getElementById(`mob-nav-${id}`)) document.getElementById(`mob-nav-${id}`).classList.add('text-blue-500');
            
            const container = document.getElementById('view-container');
            document.getElementById('view-title').innerText = menuItems.find(m => m.id === id)?.label || "Panel";

            switch(id) {
                case 'profil': renderProfil(container); break;
                case 'program': renderProgram(container); break;
                case 'konular': renderKonular(container); break;
                case 'kronometre': renderKronometre(container); break;
                case 'deneme': renderDeneme(container); break;
                case 'performans': renderPerformans(container); break;
                case 'unutma': renderUnutma(container); break;
                case 'ayarlar': renderAyarlar(container); break;
                default: container.innerHTML = `<div class="p-10 text-center glass rounded-2xl">Modül hazır değil.</div>`;
            }
        }

        // ==========================================
        // 1. PROFİL MODÜLÜ
        // ==========================================
        function renderProfil(el) {
            el.innerHTML = `
                <div class="grid md:grid-cols-3 gap-6 h-full pb-10">
                    <div class="glass p-6 rounded-2xl flex flex-col items-center text-center">
                        <label class="photo-upload-wrapper relative w-32 h-32 rounded-full cursor-pointer overflow-hidden border-4 border-gray-700 bg-gray-800 flex items-center justify-center mb-4 group shadow-lg">
                            ${appData.user.photo ? `<img src="${appData.user.photo}" class="w-full h-full object-cover">` : `<span class="text-4xl font-bold text-gray-500">${appData.user.firstName[0]}${appData.user.lastName[0]}</span>`}
                            <div class="overlay hidden absolute inset-0 bg-black/60 flex items-center justify-center text-white text-xs text-center p-2"><i class="fas fa-camera text-2xl"></i></div>
                            <input type="file" accept="image/*" onchange="uploadPhoto(event)">
                        </label>
                        <h3 class="text-2xl font-bold">${appData.user.firstName} ${appData.user.lastName}</h3>
                        <div class="mt-4 px-4 py-1 bg-blue-500/20 text-blue-400 rounded-full text-xs font-bold uppercase tracking-wider">${appData.user.grade}</div>
                    </div>
                    <div class="md:col-span-2 glass p-6 rounded-2xl space-y-4">
                        <h3 class="font-bold border-b border-gray-700 pb-2 text-blue-400">Kişisel Bilgiler</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <div><label class="text-xs text-gray-500 font-semibold">Okul</label><p class="mt-1 text-lg">${appData.user.schoolName}</p></div>
                            <div><label class="text-xs text-gray-500 font-semibold">No</label><p class="mt-1 text-lg">${appData.user.schoolNo}</p></div>
                            <div>
                                <label class="text-xs text-gray-500 font-semibold">E-posta</label>
                                <input type="email" value="${appData.user.email}" onchange="appData.user.email=this.value;save()" class="w-full bg-gray-800 p-3 mt-1 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition">
                            </div>
                            <div>
                                <label class="text-xs text-gray-500 font-semibold">Telefon</label>
                                <input type="tel" value="${appData.user.phone}" onchange="appData.user.phone=this.value;save()" class="w-full bg-gray-800 p-3 mt-1 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition">
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function uploadPhoto(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { appData.user.photo = ev.target.result; save(); navigate('profil'); };
            reader.readAsDataURL(e.target.files[0]);
        }

        // ==========================================
        // 2. KANBAN (PROGRAM) MODÜLÜ (Dinamik Tarihli)
        // ==========================================
        let currentTaskDay = '';

        function getWeekDates() {
            const daysArr = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            const months = ['Oca', 'Şub', 'Mar', 'Nis', 'May', 'Haz', 'Tem', 'Ağu', 'Eyl', 'Eki', 'Kas', 'Ara'];
            let curr = new Date();
            let week = [];
            // Haftanın ilk günü Pazartesi
            let first = curr.getDate() - curr.getDay() + (curr.getDay() === 0 ? -6 : 1);
            let monday = new Date(curr.setDate(first));

            for (let i = 0; i < 7; i++) {
                let next = new Date(monday);
                next.setDate(monday.getDate() + i);
                week.push({
                    dayName: daysArr[next.getDay()],
                    dateStr: `${next.getDate()} ${months[next.getMonth()]}`
                });
            }
            return week;
        }

        function renderProgram(el) {
            const weekDates = getWeekDates();
            
            let boardHtml = `<div class="flex gap-4 overflow-x-auto h-full snap-x pb-4 hide-scroll items-start">`;
            
            weekDates.forEach(dayObj => {
                const day = dayObj.dayName;
                const date = dayObj.dateStr;
                
                boardHtml += `
                    <div class="min-w-[280px] w-[280px] shrink-0 snap-center glass rounded-2xl p-4 flex flex-col h-full max-h-[calc(100vh-140px)]">
                        <div class="flex justify-between items-center mb-3 border-b border-gray-700 pb-2">
                            <h3 class="font-bold text-blue-400">
                                <i class="fas fa-calendar-day mr-1"></i> ${day} 
                                <span class="text-xs text-gray-500 font-normal ml-1">(${date})</span>
                            </h3>
                            <span class="text-xs text-gray-500 bg-gray-800 px-2 py-1 rounded-full" id="count-${day}">0</span>
                        </div>
                        <div id="tasks-${day}" class="flex-1 overflow-y-auto space-y-3 pr-1 min-h-[100px] hide-scroll"></div>
                        <button onclick="openTaskModal('${day}')" class="mt-3 w-full py-3 bg-blue-600/10 text-blue-500 hover:bg-blue-600 hover:text-white rounded-xl font-bold transition border border-dashed border-blue-500/50 flex items-center justify-center gap-2 group">
                            <i class="fas fa-plus group-hover:scale-125 transition"></i> Ekle
                        </button>
                    </div>
                `;
            });
            el.innerHTML = boardHtml + `</div>`;
            renderTasks();
        }

        function openTaskModal(day) {
            currentTaskDay = day;
            document.getElementById('task-modal-title').innerHTML = `<i class="fas fa-calendar-plus mr-2"></i> ${day}`;
            document.getElementById('task-modal').classList.remove('hidden');
            document.getElementById('modal-ders').value = '';
            document.getElementById('modal-konu').innerHTML = '<option value="">Önce Ders Seçin</option>';
            document.getElementById('modal-q').value = '';
        }

        function closeTaskModal() { document.getElementById('task-modal').classList.add('hidden'); }

        function updateModalSubj() {
            const val = document.getElementById('modal-ders').value;
            const target = document.getElementById('modal-konu');
            if(!val) { target.innerHTML = '<option value="">Önce Ders Seçin</option>'; return; }
            const [ex, d] = val.split('-');
            target.innerHTML = tytAytKonulari[ex][d].map(k=>`<option value="${k}">${k}</option>`).join('');
        }

        function saveTaskModal() {
            const d = document.getElementById('modal-ders').value;
            const k = document.getElementById('modal-konu').value;
            const q = document.getElementById('modal-q').value;
            
            if(!d || !k) return showToast("Ders ve konu seçmelisin!", "warning");

        async function handlePDFUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const loadingEl = document.getElementById('pdf-loading');
            loadingEl.classList.remove('hidden');
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.type !== "application/pdf") continue;

                loadingEl.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> ${i+1} / ${files.length} PDF Okunuyor...`;

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(new Uint8Array(arrayBuffer)).promise;
                    let fullText = "";

                    for (let p = 1; p <= pdf.numPages; p++) {
                        const page = await pdf.getPage(p);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ") + " \n";
                    }

                    const examData = extractDataFromText(fullText);
                    if(examData) { appData.exams.unshift(examData); successCount++; }

                    if (i === files.length - 1) document.getElementById('regex-input').value = fullText;

                } catch (error) { console.error("PDF okuma hatası:", error); }
            }

            loadingEl.classList.add('hidden');
            event.target.value = ''; 
            
            if (successCount > 0) { save(); renderExams(); showToast(`${successCount} adet sınav eklendi.`, "success"); } 
            else { showToast("Sınav verisi tespit edilemedi. Lütfen manuel girin.", "error"); }
        }

        // GELİŞMİŞ REGEX (Daha Aggresif YKS Okuyucu)
        function extractDataFromText(txt) {
            if(!txt) return null;
            
            // Puanı Bul (TYT, Sayısal, EA, Sözel vs.)
            const puanMatch = txt.match(/(?:Sayısal|TYT|EŞİT AĞIRLIK|SÖZEL|EA|Sözcük)\s*[:=]?\s*([\d\.,]+)/i) || txt.match(/YKS\s*Puan[ıi]\s*[:=]?\s*([\d\.,]+)/i);
            const puan = puanMatch ? puanMatch[1] : "Puan Okunamadı";

            // Ders bazlı Netleri bulmak için kapsamlı fonksiyon
            const findNet = (keywords) => {
                for (let kw of keywords) {
                    // Yöntem 1: Türkçe 40 (Soru) 35 (Doğru) 5 (Yanlış) 0 (Boş) 33,75 (Net)
                    let reg1 = new RegExp(`${kw}.*?\\s+(\\d{1,2})\\s+(\\d{1,2})\\s+(\\d{1,2})\\s+(\\d{1,2}(?:,\\d{1,2})?)`, 'i');
                    let m1 = txt.match(reg1);
                    if(m1) return parseFloat(m1[4].replace(',', '.'));

                    // Yöntem 2: Net: 12,50 MATEMATİK veya MATEMATİK ... Net: 12.50
                    let reg2 = new RegExp(`Net\\s*[:=]?\\s*(\\d+(?:,\\d+)?)\\s*.*?${kw}`, 'i');
                    let m2 = txt.match(reg2);
                    if(m2) return parseFloat(m2[1].replace(',', '.'));

                    let reg3 = new RegExp(`${kw}.*?Net\\s*[:=]?\\s*(\\d+(?:,\\d+)?)`, 'i');
                    let m3 = txt.match(reg3);
                    if(m3) return parseFloat(m3[1].replace(',', '.'));
                }
                return 0;
            };

            const mat = findNet(['MATEMATİK', 'MAT']);
            const fen = findNet(['FEN', 'FİZİK', 'KİMYA', 'BİYOLOJİ']);
            const turk = findNet(['TÜRKÇE', 'TÜRK']);
            const sos = findNet(['SOSYAL', 'TARİH', 'COĞRAFYA', 'FELSEFE', 'DİN']);
            const edebiyat = findNet(['EDEBİYAT']);

            let totalNet = mat + fen + turk + sos + edebiyat;
            
            // Eğer ders netleri sıfırsa (okunamadıysa), ana tablodan toplam neti çek
            if (totalNet === 0) {
                // Örn: 166 (Soru) 32 (D) 28 (Y) 106 (B) 25,00 (Net) VEYA 120 (Soru) ...
                const fallbackMatch = txt.match(/(?:120|160|166|80)\s+\d{1,3}\s+\d{1,3}\s+\d{1,3}\s+(\d{1,3}(?:,\d{1,2})?)/);
                if (fallbackMatch) totalNet = parseFloat(fallbackMatch[1].replace(',', '.'));
            }

            // Halen sıfırsa, belgedeki en büyük "Net" değerini bul
            if (totalNet === 0) {
                const allNets = [...txt.matchAll(/Net\s*[:=]?\s*(\d+(?:,\d+)?)/gi)].map(m => parseFloat(m[1].replace(',', '.')));
                if(allNets.length > 0) totalNet = Math.max(...allNets); 
            }

            let details = [];
            if(mat>0) details.push(`Mat: ${mat}`); if(fen>0) details.push(`Fen: ${fen}`);
            if(turk>0) details.push(`Tür: ${turk}`); if(sos>0) details.push(`Sos: ${sos}`); if(edebiyat>0) details.push(`Edb: ${edebiyat}`);
            let detailStr = details.length > 0 ? details.join(' | ') : "Otomatik Genel Net";

            if (totalNet === 0 && puan === "Puan Okunamadı") return null;

            return { id: Date.now() + Math.floor(Math.random()*1000), date: new Date().toLocaleDateString(), net: totalNet, puan: puan, details: detailStr };
        }

        }

        // ==========================================
        // 8. AYARLAR MODÜLÜ
        // ==========================================
        function renderAyarlar(el) {
            el.innerHTML = `
                <div class="max-w-md mx-auto space-y-6 pb-10">
                    <div class="glass p-6 rounded-2xl text-center">
                        <i class="fas fa-cloud-download-alt text-4xl text-blue-500 mb-4"></i>
                        <h3 class="font-bold mb-2">Verileri Yedekle</h3>
                        <p class="text-xs text-gray-400 mb-6">Uygulama internetsiz çalıştığı için veriler cihazında durur. Başka cihaza geçmek için indir.</p>
                        <button onclick="exportData()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 transition rounded-xl font-bold shadow-lg shadow-blue-900/50">İndir (.json)</button>
                    </div>
                    
                    <div class="glass p-6 rounded-2xl text-center">
                        <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i>
                        <h3 class="font-bold mb-2">Veri Yükle</h3>
                        <p class="text-xs text-gray-400 mb-6">Daha önce indirdiğin .json yedeğini buraya yükleyebilirsin.</p>
                        <label class="w-full py-3 bg-gray-700 hover:bg-gray-600 transition rounded-xl font-bold flex items-center justify-center cursor-pointer shadow-lg">
                            Dosya Seç
                            <input type="file" onchange="importData(event)" accept=".json" class="hidden">
                        </label>
                    </div>
                    
                    <button onclick="resetAll()" class="w-full py-4 text-red-500 border border-red-500/20 rounded-xl hover:bg-red-600 hover:text-white transition font-bold"><i class="fas fa-trash-alt mr-2"></i>Tüm Sistemi Sıfırla</button>
                </div>
            `;
        }
        
        function exportData() {
            const blob = new Blob([JSON.stringify(appData)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download=`yks_yedek_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }
        
        function importData(e) {
            const reader = new FileReader();
            reader.onload=(ev)=>{ 
                try { appData=JSON.parse(ev.target.result); save(); location.reload(); } 
                catch(err) { showToast("Dosya bozuk veya hatalı!", "error"); }
            };
            reader.readAsText(e.target.files[0]);
        }
        
        function resetAll() { if(confirm('Tüm kayıtların silinecek. Emin misin?')) { localStorage.removeItem('yks_analiz_data'); location.reload(); } }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>
</html>
