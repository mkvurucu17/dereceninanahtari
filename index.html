<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YKS Analiz Merkezi | Profesyonel Sınav Yönetimi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { light: '#3b82f6', dark: '#1d4ed8', bg: '#0f172a' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s ease; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .sidebar-item.active { @apply bg-blue-600 text-white; }
        .mobile-sidebar-item.active { @apply text-blue-500 bg-blue-500/10; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .photo-upload-wrapper input[type="file"] { display: none; }
        .photo-upload-wrapper:hover .overlay { display: flex; }
        input, select, textarea { font-size: 16px !important; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-brand-bg text-gray-900 dark:text-gray-100 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-brand-bg px-4">
        <div class="max-w-md w-full glass p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-500 italic">YKS Analiz Merkezi</h1>
                <p class="text-gray-400 mt-2">Geleceğini Verilerle Yönet</p>
            </div>
            <div id="login-selection" class="space-y-4">
                <button onclick="document.getElementById('login-selection').classList.add('hidden'); document.getElementById('student-form').classList.remove('hidden');" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition flex items-center justify-center gap-3">
                    <i class="fas fa-user-graduate text-xl"></i> Öğrenci Girişi
                </button>
            </div>
            <form id="student-form" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="schoolName" placeholder="Okul Adı" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                    <input type="text" id="schoolNo" placeholder="Okul No" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="firstName" placeholder="İsim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                    <input type="text" id="lastName" placeholder="Soyisim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="grade" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full">
                        <option>12. Sınıf</option><option>Mezun</option><option>11. Sınıf</option>
                    </select>
                    <input type="text" id="branch" placeholder="Şube (SAY/EA/SÖZ)" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full">
                </div>
                <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold transition">Sistemi Başlat</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 glass border-r border-gray-800 flex flex-col shrink-0 hidden md:flex">
            <div class="p-6 border-b border-gray-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl text-white">Y</div>
                <span class="font-bold text-sm tracking-widest uppercase">Analiz Merkezi</span>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="sidebar-nav"></nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="document.documentElement.classList.toggle('dark');" class="w-full p-2 flex items-center justify-center gap-2 hover:bg-gray-800 rounded-lg transition">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    <span>Tema Değiştir</span>
                </button>
            </div>
        </aside>

        <div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-gray-800 grid grid-cols-5 p-1 z-40 bg-brand-bg/95 gap-1" id="mobile-nav"></div>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 relative pb-24 md:pb-8">
            <header class="mb-6 flex justify-between items-center">
                <h2 id="view-title" class="text-2xl md:text-3xl font-bold">Hoş Geldin, <span id="user-display-name">...</span></h2>
                <div id="timer-badge" class="hidden px-4 py-2 bg-red-600/20 text-red-500 rounded-full border border-red-500 animate-pulse font-mono font-bold">00:00:00</div>
            </header>
            <div id="view-container" class="animate-in slide-in-from-bottom-4 duration-500 h-[calc(100%-80px)]"></div>
            <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2"></div>
        </main>
    </div>

    <div id="task-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="w-full max-w-sm glass p-6 rounded-2xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg/90">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-3">
                <h3 class="font-bold text-lg text-blue-400" id="task-modal-title">Görev Ekle</h3>
                <button onclick="document.getElementById('task-modal').classList.add('hidden')" class="text-gray-400 hover:text-white w-8 h-8 rounded-lg hover:bg-gray-800 transition"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-3">
                <select id="modal-ders" onchange="updateModalSubj()" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition"><option value="">Ders Seç...</option></select>
                <select id="modal-konu" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition"><option value="">Önce Ders Seçin</option></select>
                <input type="number" id="modal-q" placeholder="Hedef Soru Sayısı" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition">
                <button onclick="saveTaskModal()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-white transition mt-4">Programa Ekle</button>
            </div>
        </div>
    </div>

    <div id="exam-analysis-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="w-full max-w-md glass p-6 rounded-2xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg/90 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-3">
                <h3 class="font-bold text-lg text-blue-400">Deneme Konu Analizi</h3>
                <button onclick="closeExamAnalysisModal()" class="text-gray-400 hover:text-white w-8 h-8 rounded-lg hover:bg-gray-800 transition"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex gap-2 mb-4">
                <select id="ea-ders" onchange="updateEAModalSubj()" class="w-1/2 bg-gray-800 p-2 rounded-xl border border-gray-700 text-sm outline-none"><option value="">Ders Seç...</option></select>
                <select id="ea-konu" class="w-1/2 bg-gray-800 p-2 rounded-xl border border-gray-700 text-sm outline-none"><option value="">Konu Seç...</option></select>
            </div>
            <button onclick="addExamTopic('Yanlış/Boş')" class="w-full mb-4 py-2 bg-red-600/20 text-red-500 border border-red-500/50 hover:bg-red-600 hover:text-white rounded-lg transition text-sm font-bold"><i class="fas fa-plus mr-1"></i> Manuel Eksik Ekle</button>
            
            <div id="ea-list" class="flex-1 overflow-y-auto space-y-2 border-t border-gray-700 pt-3 hide-scroll min-h-[150px]"></div>
        </div>
    </div>

    <script>
        function formatDateNumeric(d) { return String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + d.getFullYear(); }

        const tytAytKonulari = {
            "TYT": {
                "Türkçe": ["Sözcükte Anlam", "Cümlede Anlam", "Paragraf", "Ses Bilgisi", "Yazım Kuralları", "Noktalama İşaretleri", "Sözcük Türleri", "Sözcükte Yapı", "Fiiller ve Fiilimsiler", "Cümlenin Ögeleri", "Cümle Türleri", "Anlatım Bozuklukları"],
                "Matematik": ["Temel Kavramlar", "Sayı Basamakları", "Bölünebilme", "EBOB-EKOK", "Rasyonel Sayılar", "Basit Eşitsizlikler", "Mutlak Değer", "Üslü Sayılar", "Köklü Sayılar", "Çarpanlara Ayırma", "Oran-Orantı", "Denklem Çözme", "Problemler", "Kümeler", "Mantık", "Fonksiyonlar", "Permütasyon-Kombinasyon-Olasılık", "Veri-İstatistik"],
                "Geometri": ["Doğruda ve Üçgende Açılar", "Özel Üçgenler", "Açıortay-Kenarortay", "Benzerlik", "Çokgenler ve Dörtgenler", "Çember ve Daire", "Katı Cisimler", "Analitik Geometri"],
                "Fizik": ["Fizik Bilimine Giriş", "Madde ve Özellikleri", "Hareket ve Kuvvet", "İş, Güç, Enerji", "Isı ve Sıcaklık", "Elektrostatik", "Elektrik ve Manyetizma", "Basınç ve Kaldırma Kuvveti", "Dalgalar", "Optik"],
                "Kimya": ["Kimya Bilimi", "Atom ve Periyodik Sistem", "Kimyasal Türler Arası Etkileşimler", "Maddenin Halleri", "Doğa ve Kimya", "Kimyanın Temel Kanunları ve Hesaplamalar", "Karışımlar", "Asitler, Bazlar ve Tuzlar", "Kimya Her Yerde"],
                "Biyoloji": ["Canlıların Ortak Özellikleri", "İnorganik/Organik Bileşikler", "Hücre", "Canlıların Sınıflandırılması", "Hücre Bölünmeleri", "Kalıtım", "Ekosistem Ekolojisi"]
            },
            "AYT": {
                "Matematik": ["İkinci Dereceden Denklemler", "Karmaşık Sayılar", "Parabol", "Eşitsizlikler", "Polinomlar", "Logaritma", "Diziler", "Trigonometri", "Limit ve Süreklilik", "Türev", "İntegral"],
                "Fizik": ["Vektörler ve Bağıl Hareket", "Newton'un Hareket Yasaları", "Atışlar", "İş, Güç ve Enerji", "İtme ve Momentum", "Tork ve Denge", "Elektriksel Kuvvet ve Potansiyel", "Manyetizma", "Çembersel Hareket", "Basit Harmonik Hareket", "Dalga Mekaniği", "Modern Fizik", "Radyoaktivite"],
                "Kimya": ["Modern Atom Teorisi", "Gazlar", "Sıvı Çözeltiler", "Kimyasal Tepkimelerde Enerji", "Tepkimelerde Hız", "Kimyasal Denge", "Asit-Baz Dengesi", "Kçç", "Elektrokimya", "Karbon Kimyasına Giriş", "Organik Bileşikler"],
                "Biyoloji": ["Sinir Sistemi", "Endokrin Sistem", "Duyu Organları", "Destek ve Hareket Sistemi", "Sindirim Sistemi", "Dolaşım ve Bağışıklık Sistemi", "Solunum Sistemi", "Boşaltım Sistemi", "Üreme Sistemi", "Popülasyon Ekolojisi", "Protein Sentezi", "Fotosentez ve Kemosentez", "Hücresel Solunum", "Bitkisel Dokular ve Organlar", "Bitkilerde Hareket ve Taşıma", "Bitkilerde Üreme"]
            }
        };

        let appData = {
            user: { firstName: '', lastName: '', schoolName: '', schoolNo: '', grade: '', branch: '', hasCoach: false, email: '', phone: '', photo: '' },
            tasks: [], subjects: {}, performance: { totalMinutes: 0, totalQuestions: 0, history: [] },
            exams: [], stopwatch: { running: false, startTime: null, elapsed: 0, lastLapElapsed: 0 }, activeLaps: []
        };

        window.onload = () => {
            const saved = localStorage.getItem('yks_analiz_data');
            if (saved) { 
                const parsed = JSON.parse(saved); appData = {...appData, ...parsed}; 
                appData.exams.forEach(e => { if(!e.topics) e.topics = []; if(!e.type) e.type = e.puan && e.puan.includes("TYT") ? "TYT" : "AYT"; });
                initApp(); 
            }
            let ops = '<option value="">Ders Seç...</option>';
            Object.keys(tytAytKonulari.TYT).forEach(d => ops += `<option value="TYT-${d}">TYT ${d}</option>`);
            Object.keys(tytAytKonulari.AYT).forEach(d => ops += `<option value="AYT-${d}">AYT ${d}</option>`);
            document.getElementById('modal-ders').innerHTML = ops; document.getElementById('ea-ders').innerHTML = ops;
        };

        document.getElementById('student-form').onsubmit = (e) => {
            e.preventDefault();
            appData.user = {
                ...appData.user,
                firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value,
                schoolName: document.getElementById('schoolName').value, schoolNo: document.getElementById('schoolNo').value,
                grade: document.getElementById('grade').value, branch: document.getElementById('branch').value,
                hasCoach: document.getElementById('hasCoach').checked
            };
            save(); initApp();
        };

        function initApp() {
            document.getElementById('login-overlay').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = appData.user.firstName;
            renderSidebar(); navigate('deneme'); 
        }

        function save() { localStorage.setItem('yks_analiz_data', JSON.stringify(appData)); }

        function showToast(message, type = "warning") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === "warning" ? "bg-yellow-600" : (type === "error" ? "bg-red-600" : "bg-green-600");
            const icon = type === "success" ? "fa-check-circle" : "fa-exclamation-triangle";
            toast.className = `${color} text-white px-4 py-3 rounded-xl shadow-lg animate-in slide-in-from-right-8 duration-300 flex items-center gap-3`;
            toast.innerHTML = `<i class="fas ${icon}"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast); setTimeout(() => toast.remove(), 4000);
        }

        // --- MENÜ YÖNETİMİ ---
        const menuItems = [
            { id: 'program', label: 'Program', icon: 'fa-calendar-alt' },
            { id: 'kronometre', label: 'Sayaç', icon: 'fa-stopwatch' },
            { id: 'deneme', label: 'Deneme', icon: 'fa-chart-line' },
            { id: 'performans', label: 'Performans', icon: 'fa-fire' },
            { id: 'ayarlar', label: 'Ayarlar', icon: 'fa-cog' }
        ];

        function renderSidebar() {
            document.getElementById('sidebar-nav').innerHTML = [
                { id: 'profil', label: 'Profil', icon: 'fa-user' }, ...menuItems, { id: 'unutma', label: 'Unutma Eğrisi', icon: 'fa-brain' }
            ].map(item => `
                <button onclick="navigate('${item.id}')" id="nav-${item.id}" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-gray-400 hover:bg-gray-800">
                    <i class="fas ${item.icon}"></i><span class="font-medium">${item.label}</span>
                </button>
            `).join('');

            // Mobilde grid ile 5 öğeyi yan yana diz (tam sığar)
            document.getElementById('mobile-nav').innerHTML = menuItems.map(item => `
                <button onclick="navigate('${item.id}')" id="mob-nav-${item.id}" class="mobile-sidebar-item flex flex-col items-center justify-center p-2 text-gray-400 transition rounded-xl">
                    <i class="fas ${item.icon} text-lg mb-1"></i><span class="text-[9px] font-bold text-center">${item.label}</span>
                </button>
            `).join('');
        }

        function navigate(id) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active', 'text-white'));
            document.querySelectorAll('.mobile-sidebar-item').forEach(el => el.classList.remove('active'));
            if(document.getElementById(`nav-${id}`)) document.getElementById(`nav-${id}`).classList.add('active', 'text-white');
            if(document.getElementById(`mob-nav-${id}`)) document.getElementById(`mob-nav-${id}`).classList.add('active');
            
            const container = document.getElementById('view-container');
            const titles = { 'profil':'Profil', 'program':'Programım', 'kronometre':'Kronometre', 'deneme':'Deneme Analizi', 'performans':'Performansım', 'unutma':'Unutma Eğrisi', 'ayarlar':'Ayarlar' };
            document.getElementById('view-title').innerText = titles[id] || "Panel";

            if(id === 'profil') renderProfil(container);
            else if(id === 'program') renderProgram(container);
            else if(id === 'kronometre') renderKronometre(container);
            else if(id === 'deneme') renderDeneme(container);
            else if(id === 'performans') renderPerformans(container);
            else if(id === 'unutma') renderUnutma(container);
            else if(id === 'ayarlar') renderAyarlar(container);
        }

        // ==========================================
        // PROFİL MODÜLÜ
        // ==========================================
        function renderProfil(el) {
            el.innerHTML = `<div class="grid md:grid-cols-3 gap-6 h-full pb-10"><div class="glass p-6 rounded-2xl flex flex-col items-center text-center"><label class="photo-upload-wrapper relative w-32 h-32 rounded-full cursor-pointer overflow-hidden border-4 border-gray-700 bg-gray-800 flex items-center justify-center mb-4 group shadow-lg">${appData.user.photo ? `<img src="${appData.user.photo}" class="w-full h-full object-cover">` : `<span class="text-4xl font-bold text-gray-500">${appData.user.firstName[0]}${appData.user.lastName[0]}</span>`}<div class="overlay hidden absolute inset-0 bg-black/60 flex items-center justify-center text-white text-xs text-center p-2"><i class="fas fa-camera text-2xl"></i></div><input type="file" accept="image/*" onchange="uploadPhoto(event)"></label><h3 class="text-2xl font-bold">${appData.user.firstName} ${appData.user.lastName}</h3><div class="mt-4 px-4 py-1 bg-blue-500/20 text-blue-400 rounded-full text-xs font-bold uppercase tracking-wider">${appData.user.grade}</div></div><div class="md:col-span-2 glass p-6 rounded-2xl space-y-4"><h3 class="font-bold border-b border-gray-700 pb-2 text-blue-400">Kişisel Bilgiler</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-5"><div><label class="text-xs text-gray-500 font-semibold">Okul</label><p class="mt-1 text-lg">${appData.user.schoolName}</p></div><div><label class="text-xs text-gray-500 font-semibold">No</label><p class="mt-1 text-lg">${appData.user.schoolNo}</p></div><div><label class="text-xs text-gray-500 font-semibold">E-posta</label><input type="email" value="${appData.user.email}" onchange="appData.user.email=this.value;save()" class="w-full bg-gray-800 p-3 mt-1 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition"></div><div><label class="text-xs text-gray-500 font-semibold">Telefon</label><input type="tel" value="${appData.user.phone}" onchange="appData.user.phone=this.value;save()" class="w-full bg-gray-800 p-3 mt-1 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition"></div></div></div></div>`;
        }
        function uploadPhoto(e) { const r = new FileReader(); r.onload=(ev)=>{appData.user.photo=ev.target.result;save();navigate('profil');}; r.readAsDataURL(e.target.files[0]); }

        // ==========================================
        // KANBAN PROGRAM MODÜLÜ
        // ==========================================
        let currentWeekOffset = 0; let currentTaskDate = ''; let currentTaskDayName = '';
        function getWeekDates(offset = 0) {
            const curr = new Date(); const first = curr.getDate() - curr.getDay() + (curr.getDay() === 0 ? -6 : 1) + (offset * 7);
            let monday = new Date(curr.setDate(first));
            const daysArr = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            let week = [];
            for (let i = 0; i < 7; i++) {
                let next = new Date(monday); next.setDate(monday.getDate() + i);
                week.push({ dayName: daysArr[next.getDay()], dateStr: formatDateNumeric(next) });
            }
            return week;
        }

        function renderProgram(el) {
            const weekDates = getWeekDates(currentWeekOffset);
            let html = `<div class="flex justify-between items-center mb-4 glass p-3 rounded-xl sticky top-0 z-10 bg-brand-bg/90 backdrop-blur"><button onclick="currentWeekOffset--; renderProgram(document.getElementById('view-container'))" class="px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition text-sm"><i class="fas fa-chevron-left"></i></button><div class="text-center"><h3 class="font-bold text-blue-400">${currentWeekOffset===0?'Bu Hafta':(currentWeekOffset<0?'Geçmiş':'Gelecek')}</h3><p class="text-xs text-gray-400 font-mono">${weekDates[0].dateStr} - ${weekDates[6].dateStr}</p></div><button onclick="currentWeekOffset++; renderProgram(document.getElementById('view-container'))" class="px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition text-sm"><i class="fas fa-chevron-right"></i></button></div><div class="flex gap-4 overflow-x-auto h-[calc(100%-80px)] snap-x pb-4 hide-scroll items-start">`;
            
            weekDates.forEach(dayObj => {
                html += `<div class="min-w-[280px] w-[280px] shrink-0 snap-center glass rounded-2xl p-4 flex flex-col h-full max-h-[calc(100vh-220px)]"><div class="flex justify-between items-center mb-3 border-b border-gray-700 pb-2"><h3 class="font-bold text-blue-400 flex flex-col"><span><i class="fas fa-calendar-day mr-1"></i> ${dayObj.dayName}</span><span class="text-xs text-gray-400 font-mono mt-1">${dayObj.dateStr}</span></h3><span class="text-xs text-gray-500 bg-gray-800 px-2 py-1 rounded-full" id="count-${dayObj.dateStr}">0</span></div><div id="tasks-${dayObj.dateStr}" class="flex-1 overflow-y-auto space-y-3 pr-1 min-h-[100px] hide-scroll"></div><button onclick="currentTaskDate='${dayObj.dateStr}'; currentTaskDayName='${dayObj.dayName}'; document.getElementById('task-modal').classList.remove('hidden');" class="mt-3 w-full py-3 bg-blue-600/10 text-blue-500 hover:bg-blue-600 hover:text-white rounded-xl font-bold transition border border-dashed border-blue-500/50 flex items-center justify-center gap-2 group"><i class="fas fa-plus group-hover:scale-125 transition"></i> Ekle</button></div>`;
            });
            el.innerHTML = html + `</div>`;

        function updateSW() {

        async function handlePDFUpload(event) {
            const files = event.target.files; if (!files || files.length === 0) return;
            const alan = document.getElementById('exam-alan').value;
            const loadingEl = document.getElementById('pdf-loading'); loadingEl.classList.remove('hidden');
            let successCount = 0;
            
            for (let i = 0; i < files.length; i++) {

                loadingEl.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> ${i+1} / ${files.length} Okunuyor...`;
                try {
                    const pdf = await pdfjsLib.getDocument(new Uint8Array(await files[i].arrayBuffer())).promise;
                    let fullText = "";
                    for (let p = 1; p <= pdf.numPages; p++) fullText += (await (await pdf.getPage(p)).getTextContent()).items.map(item => item.str).join(" ") + " \n";
                    const examData = extractDataFromText(fullText, alan);
                    if(examData) { appData.exams.unshift(examData); successCount++; }
                } catch (err) {}
            }
            loadingEl.classList.add('hidden'); event.target.value = ''; 
            if (successCount > 0) { save(); renderExams(); showToast(`${successCount} sınav eklendi.`, "success"); } else { showToast("Sınav tespit edilemedi.", "error"); }
        }

        // AKILLI NET VE KONU HESAPLAYICI (+, -, Boş)
        function extractDataFromText(txt, alan) {
            if(!txt) return null;
            let cleanTxt = txt.replace(/\r/g, '');
            let lines = cleanTxt.split('\n');

            let matD=0, matY=0, fizD=0, fizY=0, kimD=0, kimY=0, biyoD=0, biyoY=0;
            let autoTopics = [];

            // Satır satır tarayıp +, - kontrolü yapma
            for(let i=0; i<lines.length; i++) {
                let line = lines[i];
                let match = line.match(/(?:AYT|TYT)\.(MAT|FZK|KMY|BY|TRH|CGR|FLSF|DKAB|TDE)\.([\d\.]+)\s*(.*)/i);
                
                if(match) {
                    let dersKodu = match[1].toUpperCase();
                    let konuAdi = match[3].trim().substring(0,40);
                    
                    // Sadece Sayısal alan seçiliyse MAT, FZK, KMY, BY tarayalım
                    if(alan === 'SAY' && !['MAT','FZK','KMY','BY'].includes(dersKodu)) continue;

                    // Doğru (+) mu, Yanlış (-) veya küçük harf mi?
                    // pdf.js satırları karmaşık verdiği için bir önceki, o anki veya sonraki satırda "+" veya "-" arayalım
                    let ctx = (lines[i-1]||'') + line + (lines[i+1]||'');
                    
                    let isCorrect = ctx.includes('+');
                    let isWrong = ctx.includes('-') || /[a-z]/.test(line.split('AYT')[0]||''); // Örn: 127 Eb (b yanlış şık)
                    
                    if(isCorrect) {
                        if(dersKodu==='MAT') matD++; else if(dersKodu==='FZK') fizD++; else if(dersKodu==='KMY') kimD++; else if(dersKodu==='BY') biyoD++;
                    } else if(isWrong) {
                        if(dersKodu==='MAT') matY++; else if(dersKodu==='FZK') fizY++; else if(dersKodu==='KMY') kimY++; else if(dersKodu==='BY') biyoY++;
                        autoTopics.push({ id: Date.now()+Math.random(), name: konuAdi, status: "Yanlış" });
                    } else {
                        // İşaret yoksa boştur
                        autoTopics.push({ id: Date.now()+Math.random(), name: konuAdi, status: "Boş" });
                    }
                }
            }

            // Doğru - Yanlış/4 (Net Hesabı)
            let matN = matD - (matY * 0.25);
            let fenN = (fizD+kimD+biyoD) - ((fizY+kimY+biyoY) * 0.25);
            let totalNet = matN + fenN;

            // Eğer pdf formatı çok bozuksa ve D/Y sayamadıysa tablodan çekmeyi dene (yedek)
            if(totalNet <= 0) {
                const fb = txt.match(/(?:120|160|166|80)\s+\d{1,3}\s+\d{1,3}\s+\d{1,3}\s+(\d{1,3}(?:,\d{1,2})?)/);
                if(fb) totalNet = parseFloat(fb[1].replace(',','.'));
            }

            let details = [];
            if(matD>0||matY>0) details.push(`Mat: ${matN}N (${matD}D ${matY}Y)`); 
            if(fizD>0||kimD>0||biyoD>0) details.push(`Fen: ${fenN}N (${fizD+kimD+biyoD}D ${fizY+kimY+biyoY}Y)`);

            let uniqueTopics = [];
            autoTopics.forEach(t => { if(!uniqueTopics.find(x => x.name === t.name)) uniqueTopics.push(t); });

            if(totalNet <= 0) return null;
            return { id: Date.now() + Math.floor(Math.random()*1000), date: formatDateNumeric(new Date()), type: 'AYT', net: totalNet, details: details.join(' | ') || "Net Hesaplandı", topics: uniqueTopics };
        }

                    <div class="glass p-6 rounded-2xl border-t-4 border-blue-500 flex flex-col items-center text-center"><div class="text-xs text-gray-400 font-bold uppercase tracking-wider">Toplam Süre</div><div class="text-3xl font-bold mt-1">${Math.floor(appData.performance.totalMinutes/60)}<span class="text-lg text-gray-500">sa</span> ${appData.performance.totalMinutes%60}<span class="text-lg text-gray-500">dk</span></div></div>
                    <div class="glass p-6 rounded-2xl border-t-4 border-green-500 flex flex-col items-center text-center"><div class="text-xs text-gray-400 font-bold uppercase tracking-wider">Çözülen Soru</div><div class="text-3xl font-bold mt-1">${appData.performance.totalQuestions}</div></div>
                    <div class="glass p-6 rounded-2xl border-t-4 border-orange-500 flex flex-col items-center text-center"><div class="text-xs text-gray-400 font-bold uppercase tracking-wider">Biten Konu</div><div class="text-3xl font-bold mt-1">${Object.keys(appData.subjects).length}</div></div>
                </div>
                <div class="glass p-6 rounded-2xl pb-10">
                    <h3 class="font-bold mb-4 text-blue-400">Detaylı Çalışma Geçmişi</h3>
                    <div class="space-y-6">
                        ${sortedDates.length === 0 ? '<p class="text-gray-500 text-sm text-center">Kayıt yok.</p>' : 
                          sortedDates.map(date => `
                            <div>
                                <div class="flex justify-between items-center mb-2 border-b border-gray-700/50 pb-1">
                                    <h4 class="font-bold text-gray-300"><i class="fas fa-calendar-day mr-2 text-gray-500"></i>${date}</h4>
                                    <span class="text-xs font-bold text-blue-400 bg-blue-500/10 px-2 py-1 rounded">${groups[date].qs} Soru | ${groups[date].mins} dk</span>
                                </div>
                                <div class="space-y-2">
                                    ${groups[date].items.reverse().map(i => `
                                        <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-transparent hover:border-gray-700 transition group">
                                            <div class="flex flex-col"><span class="text-sm font-medium">${i.subject}</span><span class="text-[10px] text-gray-500">${i.mins>0?i.mins+' dk - ':''}${i.qs} Soru</span></div>
                                            <button onclick="deletePerformance(${i.id})" class="w-8 h-8 rounded-lg bg-red-900/20 text-red-500 hover:bg-red-600 hover:text-white flex items-center justify-center transition opacity-100 sm:opacity-0 group-hover:opacity-100"><i class="fas fa-trash text-sm"></i></button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function deletePerformance(id) {
            const idx = appData.performance.history.findIndex(h => h.id === id);
            if(idx > -1) {
                appData.performance.totalQuestions -= appData.performance.history[idx].qs;
                appData.performance.totalMinutes -= appData.performance.history[idx].mins;
                appData.performance.history.splice(idx, 1);
                save(); renderPerformans(document.getElementById('view-container')); showToast("Kayıt silindi.", "success");
            }
        }

        // ==========================================
        // AYARLAR & UNUTMA EĞRİSİ
        // ==========================================
        function renderUnutma(el) {
            const alerts = []; const now = Date.now();
            for(let k in appData.subjects) {
                const days = Math.floor((now - appData.subjects[k].date)/(1000*60*60*24));
                if(days === 3 || days === 7 || days === 30) alerts.push({ konu: k.split('-').pop(), days });
            }
            el.innerHTML = `<div class="space-y-4 max-w-2xl mx-auto pb-10"><div class="p-5 bg-blue-600/10 border border-blue-500/30 rounded-2xl text-sm leading-relaxed flex items-start gap-4"><i class="fas fa-info-circle text-blue-500 text-2xl mt-0.5"></i><div><span class="font-bold text-blue-400 block mb-1">Ebbinghaus Unutma Eğrisi</span>Bitirdiğin konular 3., 7. ve 30. günlerinde burada tekrar kartı olarak karşına çıkar.</div></div>${alerts.length === 0 ? '<div class="text-center p-10 glass rounded-2xl text-gray-500">Bugün tekrar yok.</div>' : alerts.map(a=>`<div class="glass p-5 rounded-xl border-l-4 border-yellow-500 flex justify-between items-center"><div><div class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest mb-1"><i class="fas fa-history mr-1"></i> ${a.days}. GÜN TEKRARI</div><div class="text-xl font-bold">${a.konu}</div></div><button class="w-10 h-10 rounded-full bg-gray-800 hover:bg-yellow-600 transition"><i class="fas fa-check"></i></button></div>`).join('')}</div>`;
        }
        function renderAyarlar(el) {
            el.innerHTML = `<div class="max-w-md mx-auto space-y-6 pb-10"><div class="glass p-6 rounded-2xl text-center"><i class="fas fa-cloud-download-alt text-4xl text-blue-500 mb-4"></i><h3 class="font-bold mb-2">Verileri Yedekle</h3><button onclick="exportData()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 transition rounded-xl font-bold">İndir (.json)</button></div><div class="glass p-6 rounded-2xl text-center"><i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i><h3 class="font-bold mb-2">Veri Yükle</h3><label class="w-full py-3 bg-gray-700 hover:bg-gray-600 transition rounded-xl font-bold flex items-center justify-center cursor-pointer">Dosya Seç<input type="file" onchange="importData(event)" accept=".json" class="hidden"></label></div><button onclick="if(confirm('Emin misin?')){localStorage.removeItem('yks_analiz_data');location.reload();}" class="w-full py-4 text-red-500 border border-red-500/20 rounded-xl hover:bg-red-600 hover:text-white transition font-bold"><i class="fas fa-trash-alt mr-2"></i>Tüm Sistemi Sıfırla</button></div>`;
        }
        function exportData() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(appData)], {type: 'application/json'})); a.download=`yks_yedek_${formatDateNumeric(new Date())}.json`; a.click(); }
        function importData(e) { const r = new FileReader(); r.onload=(ev)=>{ try { appData=JSON.parse(ev.target.result); save(); location.reload(); } catch(err) { showToast("Bozuk dosya!", "error"); } }; r.readAsText(e.target.files[0]); }
    </script>
</body>
</html>
