<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YKS Analiz Merkezi | Profesyonel Sınav Yönetimi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { light: '#3b82f6', dark: '#1d4ed8', bg: '#0f172a' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .sidebar-item.active { @apply bg-blue-600 text-white; }
        .mobile-sidebar-item.active { @apply text-blue-500 bg-blue-500/10; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .photo-upload-wrapper input[type="file"] { display: none; }
        .photo-upload-wrapper:hover .overlay { display: flex; }
        input, select, textarea { font-size: 16px !important; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-brand-bg text-gray-900 dark:text-gray-100 h-screen flex flex-col">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-brand-bg px-4 hidden">
        <div class="max-w-md w-full glass p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-blue-500 italic">YKS Analiz Merkezi</h1>
                <p class="text-gray-400 mt-2">Geleceğini Verilerle Yönet</p>
            </div>
            <div id="auth-tabs" class="flex gap-2 mb-6 bg-gray-800 p-1 rounded-xl">
                <button id="tab-login" onclick="showAuthTab('login')" class="flex-1 py-2 font-bold rounded-lg bg-blue-600 text-white transition">Giriş Yap</button>
                <button id="tab-register" onclick="showAuthTab('register')" class="flex-1 py-2 font-bold rounded-lg text-gray-400 hover:text-white transition">Kayıt Ol</button>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div><label class="text-xs text-gray-400 ml-1">Telefon Numarası</label><input type="tel" id="login-phone" placeholder="05XX XXX XX XX" class="w-full p-3 mt-1 rounded bg-gray-800 border border-gray-700 outline-none focus:border-blue-500" required></div>
                <div><label class="text-xs text-gray-400 ml-1">Okul Numarası</label><input type="text" id="login-no" placeholder="Okul No" class="w-full p-3 mt-1 rounded bg-gray-800 border border-gray-700 outline-none focus:border-blue-500" required></div>
                <div class="flex items-center gap-2 p-1"><input type="checkbox" id="remember-me" class="w-5 h-5 accent-blue-600 cursor-pointer"><label for="remember-me" class="text-sm cursor-pointer">Beni Hatırla (Oturumu Açık Tut)</label></div>
                <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition shadow-lg shadow-blue-900/50">Giriş Yap</button>
            </form>
            <form id="register-form" onsubmit="handleRegister(event)" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-3"><input type="text" id="schoolName" placeholder="Okul Adı" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full focus:border-blue-500" required><input type="text" id="schoolNo" placeholder="Okul No" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full focus:border-blue-500" required></div>
                <div class="grid grid-cols-2 gap-3"><input type="text" id="firstName" placeholder="İsim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full focus:border-blue-500" required><input type="text" id="lastName" placeholder="Soyisim" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full focus:border-blue-500" required></div>
                <div class="grid grid-cols-2 gap-3"><select id="grade" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full focus:border-blue-500"><option>12. Sınıf</option><option>Mezun</option><option>11. Sınıf</option></select><input type="text" id="branch" placeholder="Şube (SAY/EA)" class="p-3 rounded bg-gray-800 border border-gray-700 outline-none w-full focus:border-blue-500"></div>
                <input type="tel" id="reg-phone" placeholder="Telefon Numarası (Giriş için gerekli)" class="w-full p-3 rounded bg-gray-800 border border-gray-700 outline-none focus:border-blue-500" required>
                <div class="flex items-center gap-2 p-1"><input type="checkbox" id="hasCoach" class="w-5 h-5 accent-blue-600 cursor-pointer"><label for="hasCoach" class="text-sm cursor-pointer">Bir koçum var</label></div>
                <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold transition shadow-lg shadow-green-900/50">Kayıt Ol ve Başla</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-1 overflow-hidden">
        <aside class="w-64 glass border-r border-gray-800 flex flex-col shrink-0 hidden md:flex">
            <div class="p-5 border-b border-gray-800 flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-500/20"><i class="fas fa-brain"></i></div>
                <div class="flex flex-col"><span class="font-bold text-sm tracking-wide leading-tight">YKS Analiz</span><span class="text-[10px] text-blue-400 font-medium tracking-widest uppercase">Merkezi</span></div>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="sidebar-nav"></nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="document.documentElement.classList.toggle('dark');" class="w-full p-2 flex items-center justify-center gap-2 hover:bg-gray-800 rounded-lg transition"><i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block text-yellow-400"></i><span>Tema Değiştir</span></button>
            </div>
        </aside>

        <div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-gray-800 grid grid-cols-5 p-1 z-40 bg-brand-bg/95 gap-1" id="mobile-nav"></div>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 relative pb-24 md:pb-8">
            <header class="mb-6 flex justify-between items-center">
                <h2 id="view-title" class="text-2xl md:text-3xl font-bold">Hoş Geldin, <span id="user-display-name">...</span></h2>
                <div id="timer-badge" class="hidden px-4 py-2 bg-red-600/20 text-red-500 rounded-full border border-red-500 animate-pulse font-mono font-bold">00:00:00</div>
            </header>
            <div id="view-container" class="animate-in slide-in-from-bottom-4 duration-500 pb-6"></div>
            <footer class="text-center text-xs text-gray-500 py-4 border-t border-gray-800/50 mt-6">© 2025 Mehmet Kerim Vurucu</footer>
            <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2"></div>
        </main>
    </div>

    <div id="task-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="w-full max-w-sm glass p-6 rounded-2xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg/90">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-3"><h3 class="font-bold text-lg text-blue-400">Görev Ekle</h3><button onclick="document.getElementById('task-modal').classList.add('hidden')" class="text-gray-400 hover:text-white w-8 h-8 rounded-lg hover:bg-gray-800 transition"><i class="fas fa-times"></i></button></div>
            <div class="mb-4"><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Akıllı Asistan Önerileri</label><div id="smart-suggestions" class="flex flex-wrap gap-1.5 max-h-[80px] overflow-y-auto hide-scroll pb-1"></div></div>
            <div class="space-y-3">
                <select id="modal-ders" onchange="updateModalSubj()" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition"><option value="">Ders Seç...</option></select>
                <select id="modal-konu" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition"><option value="">Önce Ders Seçin</option></select>
                <input type="number" id="modal-q" placeholder="Hedef Soru Sayısı" class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-sm outline-none focus:border-blue-500 transition">
                <button onclick="saveTaskModal()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-white transition mt-4">Programa Ekle</button>
            </div>
        </div>
    </div>

    <div id="exam-analysis-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="w-full max-w-md glass p-6 rounded-2xl animate-in zoom-in-95 duration-200 shadow-2xl border border-gray-700 bg-brand-bg/90 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-3"><h3 class="font-bold text-lg text-blue-400">Deneme Konu Analizi</h3><button onclick="closeExamAnalysisModal()" class="text-gray-400 hover:text-white w-8 h-8 rounded-lg hover:bg-gray-800 transition"><i class="fas fa-times"></i></button></div>
            <div class="flex gap-2 mb-4"><select id="ea-ders" onchange="updateEAModalSubj()" class="w-1/2 bg-gray-800 p-2 rounded-xl border border-gray-700 text-sm outline-none"><option value="">Ders Seç...</option></select><select id="ea-konu" class="w-1/2 bg-gray-800 p-2 rounded-xl border border-gray-700 text-sm outline-none"><option value="">Konu Seç...</option></select></div>
            <button onclick="addExamTopic('Yanlış/Boş')" class="w-full mb-4 py-2 bg-red-600/20 text-red-500 border border-red-500/50 hover:bg-red-600 hover:text-white rounded-lg transition text-sm font-bold"><i class="fas fa-plus mr-1"></i> Manuel Eksik Ekle</button>
            <div id="ea-list" class="flex-1 overflow-y-auto space-y-2 border-t border-gray-700 pt-3 hide-scroll min-h-[150px]"></div>
        </div>
    </div>

    <script>
        // --- YARDIMCI FONKSİYONLAR ---
        function formatDateNumeric(d) { return String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + d.getFullYear(); }

        const tytAytKonulari = {
            "TYT": {
                "Türkçe": ["Sözcükte Anlam","Cümlede Anlam","Paragrafta Anlam","Ses Bilgisi","Yazım Kuralları","Noktalama İşaretleri","İsimler","Sıfatlar","Zamirler","Zarflar","Edat - Bağlaç - Ünlem","Fiiller","Fiilimsiler","Cümlenin Ögeleri","Cümle Türleri","Anlatım Bozuklukları"],
                "Matematik": ["Temel Kavramlar","Sayı Basamakları","Bölme - Bölünebilme","EBOB - EKOK","Rasyonel Sayılar","Basit Eşitsizlikler","Mutlak Değer","Üslü Sayılar","Köklü Sayılar","Çarpanlara Ayırma","Oran - Orantı","Denklem Çözme","Sayı Problemleri","Kesir Problemleri","Yaş Problemleri","Yüzde - Kâr - Zarar","Karışım Problemleri","İşçi - Havuz Problemleri","Hareket Problemleri","Grafik Problemleri","Kümeler","Mantık","Fonksiyonlar","Permütasyon","Kombinasyon","Olasılık","İstatistik ve Veri"],
                "Geometri": ["Doğruda Açılar","Üçgende Açılar","Dik Üçgen","İkizkenar Üçgen","Eşkenar Üçgen","Açıortay","Kenarortay","Üçgende Alan","Üçgende Benzerlik","Çokgenler","Dörtgenler","Yamuk","Paralelkenar","Eşkenar Dörtgen","Dikdörtgen","Kare","Deltoid","Çemberde Açı","Çemberde Uzunluk","Dairede Alan","Analitik Geometri","Katı Cisimler (Prizma - Piramit - Silindir - Koni - Küre)"],
                "Fizik": ["Fizik Bilimine Giriş","Madde ve Özellikleri","Hareket ve Kuvvet","İş - Güç - Enerji","Isı ve Sıcaklık","Elektrostatik","Elektrik Akımı ve Devreleri","Manyetizma","Basınç","Kaldırma Kuvveti","Yay ve Su Dalgaları","Ses ve Deprem Dalgaları","Aydınlanma ve Gölge","Yansıma ve Aynalar","Kırılma ve Renk","Mercekler"],
                "Kimya": ["Kimya Bilimi","Atom Modelleri ve Yapısı","Periyodik Sistem","Kimyasal Türler Arası Etkileşimler","Maddenin Halleri","Doğa ve Kimya","Kimyanın Temel Kanunları","Kimyasal Hesaplamalar","Karışımlar","Karışımları Ayırma Teknikleri","Asitler - Bazlar ve Tuzlar","Kimya Her Yerde"],
                "Biyoloji": ["Canlıların Ortak Özellikleri","İnorganik Bileşikler","Karbonhidratlar","Lipitler","Proteinler ve Enzimler","Hücre Zarı ve Madde Geçişleri","Hücre Organelleri","Canlıların Sınıflandırılması","Mitoz Bölünme","Mayoz Bölünme","Eşeysiz ve Eşeyli Üreme","Kalıtım","Kan Grupları","Soyağaçları","Ekosistem Ekolojisi","Güncel Çevre Sorunları"]
            },
            "AYT": {
                "Matematik": ["İkinci Dereceden Denklemler","İkinci Dereceden Eşitsizlikler","Parabol","Karmaşık Sayılar","Polinomlar","Logaritma","Aritmetik Dizi","Geometrik Dizi","Trigonometri (Açı - Fonksiyonlar)","Trigonometrik Denklemler","Limit","Süreklilik","Türev Alma Kuralları","Türevin Geometrik Yorumu","Maksimum - Minimum Problemleri","Belirsiz İntegral","Belirli İntegral","İntegralde Alan"],
                "Fizik": ["Vektörler","Bağıl Hareket ve Nehir Problemleri","Newton'un Hareket Yasaları","Bir Boyutta Sabit İvmeli Hareket","Atışlar","İş - Güç - Enerji","İtme ve Çizgisel Momentum","Tork","Denge ve Kesişen Kuvvetler","Kütle ve Ağırlık Merkezi","Basit Makineler","Elektriksel Kuvvet ve Potansiyel","Düzgün Elektrik Alan ve Sığa","Manyetik Alan ve Manyetik Kuvvet","Elektromanyetik İndüklenme","Alternatif Akım","Transformatörler","Düzgün Çembersel Hareket","Dönerek Öteleme ve Açısal Momentum","Kütle Çekim ve Kepler Yasaları","Basit Harmonik Hareket","Su Dalgalarında Girişim ve Kırınım","Işığın Çift Yarıkta Girişimi ve Tek Yarıkta Kırınımı","Elektromanyetik Dalgalar","Atom Modelleri","Büyük Patlama ve Evrenin Oluşumu","Radyoaktivite","Özel Görelilik","Fotoelektrik Olayı","Compton ve De Broglie","Modern Fiziğin Teknolojideki Uygulamaları"],
                "Kimya": ["Kuantum Atom Modeli","Periyodik Özellikler","Gazların Özellikleri ve Gaz Yasaları","İdeal Gaz Denklemi ve Kinetik Teori","Sıvı Çözeltiler ve Derişim Birimleri","Koligatif Özellikler","Kimyasal Tepkimelerde Isı (Entalpi)","Kimyasal Tepkimelerde Hız","Kimyasal Denge (Kc - Kp)","Le Chatelier İlkesi","Sulu Çözelti Dengeleri (Asit-Baz)","Çözünürlük Dengesi (Kçç)","Redoks Tepkimeleri","Aktiflik","Elektrokimyasal Piller","Elektroliz","Karbon Kimyasına Giriş","Hibritleşme ve Molekül Geometrisi","Alkanlar","Alkenler","Alkinler","Aromatik Bileşikler","Alkoller","Eterler","Aldehitler ve Ketonlar","Karboksilik Asitler","Esterler","Enerji Kaynakları ve Sürdürülebilirlik"],
                "Biyoloji": ["Sinir Sistemi Yapısı ve İşleyişi","Endokrin Sistem ve Hormonlar","Duyu Organları","Destek ve Hareket Sistemi (Kemik - Kıkırdak - Kas)","Sindirim Sistemi","Dolaşım Sistemi (Kalp - Damarlar - Kan)","Lenf Sistemi ve Bağışıklık","Solunum Sistemi","Boşaltım Sistemi (Üriner)","Üreme Sistemi","Embriyonik Gelişim","Komünite Ekolojisi","Popülasyon Ekolojisi","Nükleik Asitlerin Yapısı (DNA - RNA)","DNA Replikasyonu","Protein Sentezi (Genden Proteine)","Genetik Mühendisliği ve Biyoteknoloji","Fotosentez","Kemosentez","Hücresel Solunum (Oksijenli / Oksijensiz / Fermantasyon)","Bitkilerin Yapısı ve Bitkisel Dokular","Bitkilerde Büyüme ve Hareket (Tropizma - Nasti)","Bitkilerde Hormonlar","Bitkilerde Taşıma (Odun - Soymuk Boruları)","Bitkilerde Beslenme","Bitkilerde Eşeyli Üreme (Çiçek ve Tohum)"]
            }
        };

        let appData = {
            user: { firstName: '', lastName: '', schoolName: '', schoolNo: '', grade: '', branch: '', hasCoach: false, email: '', phone: '', photo: '' },
            tasks: [], subjects: {}, studyDates: {}, performance: { totalMinutes: 0, totalQuestions: 0, history: [] },
            exams: [], stopwatch: { running: false, startTime: null, elapsed: 0, lastLapElapsed: 0 }, activeLaps: [],
            chartInstances: {}
        };

        window.onload = () => {
            const saved = localStorage.getItem('yks_analiz_data');
            if (saved) { 
                const parsed = JSON.parse(saved);
                appData = {...appData, ...parsed}; 
                if(!appData.studyDates) appData.studyDates = {};
                if(!appData.chartInstances) appData.chartInstances = {};
            }
            
            let ops = '<option value="">Ders Seç...</option>';
            Object.keys(tytAytKonulari.TYT).forEach(d => ops += `<option value="TYT-${d}">TYT ${d}</option>`);
            Object.keys(tytAytKonulari.AYT).forEach(d => ops += `<option value="AYT-${d}">AYT ${d}</option>`);
            document.getElementById('modal-ders').innerHTML = ops; document.getElementById('ea-ders').innerHTML = ops;

            const hasSession = localStorage.getItem('yks_session') === 'true' || sessionStorage.getItem('yks_session') === 'true';
            if (hasSession && appData.user.schoolNo) {
                initApp();
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
                if (appData.user.schoolNo && appData.user.phone) showAuthTab('login');
                else showAuthTab('register');
            }
        };

        function showAuthTab(tab) {
            if(tab === 'login') {
                document.getElementById('login-form').classList.remove('hidden'); document.getElementById('register-form').classList.add('hidden');
                document.getElementById('tab-login').className = 'flex-1 py-2 font-bold rounded-lg bg-blue-600 text-white transition'; document.getElementById('tab-register').className = 'flex-1 py-2 font-bold rounded-lg text-gray-400 hover:text-white transition';
            } else {
                document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden');
                document.getElementById('tab-register').className = 'flex-1 py-2 font-bold rounded-lg bg-blue-600 text-white transition'; document.getElementById('tab-login').className = 'flex-1 py-2 font-bold rounded-lg text-gray-400 hover:text-white transition';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('login-phone').value; const no = document.getElementById('login-no').value; const rem = document.getElementById('remember-me').checked;
            if (appData.user.phone === phone && appData.user.schoolNo === no) {
                if(rem) localStorage.setItem('yks_session', 'true'); else sessionStorage.setItem('yks_session', 'true');
                initApp(); showToast("Hoş geldin " + appData.user.firstName + "!", "success");
            } else showToast("Telefon veya Okul No hatalı!", "error");
        }

        function handleRegister(e) {
            e.preventDefault();
            appData.user = {
                ...appData.user,
                firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value,
                schoolName: document.getElementById('schoolName').value, schoolNo: document.getElementById('schoolNo').value,
                grade: document.getElementById('grade').value, branch: document.getElementById('branch').value,
                phone: document.getElementById('reg-phone').value, hasCoach: document.getElementById('hasCoach').checked
            };
            save(); localStorage.setItem('yks_session', 'true'); initApp(); showToast("Kayıt başarılı!", "success");
        }

        function initApp() {
            document.getElementById('login-overlay').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = appData.user.firstName;
            renderSidebar(); navigate('program'); 
        }

        function logout() { localStorage.removeItem('yks_session'); sessionStorage.removeItem('yks_session'); location.reload(); }
        function save() { localStorage.setItem('yks_analiz_data', JSON.stringify(appData)); }

        function showToast(message, type = "warning") {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            const color = type === "warning" ? "bg-yellow-600" : (type === "error" ? "bg-red-600" : "bg-green-600");
            const icon = type === "success" ? "fa-check-circle" : (type === "error" ? "fa-times-circle" : "fa-exclamation-triangle");
            toast.className = `${color} text-white px-4 py-3 rounded-xl shadow-lg animate-in slide-in-from-right-8 duration-300 flex items-center gap-3`;
            toast.innerHTML = `<i class="fas ${icon}"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast); setTimeout(() => toast.remove(), 4000);
        }

        // --- MENÜ ---
        const menuItems = [
            { id: 'program', label: 'Program', icon: 'fa-calendar-alt' }, { id: 'konular', label: 'Konularım', icon: 'fa-list-ul' },
            { id: 'kronometre', label: 'Sayaç', icon: 'fa-stopwatch' }, { id: 'deneme', label: 'Deneme', icon: 'fa-chart-line' },
            { id: 'performans', label: 'Performans', icon: 'fa-fire' }, { id: 'ayarlar', label: 'Ayarlar', icon: 'fa-cog' }
        ];

        function renderSidebar() {
            document.getElementById('sidebar-nav').innerHTML = [ { id: 'profil', label: 'Profil', icon: 'fa-user' }, ...menuItems, { id: 'unutma', label: 'Unutma Eğrisi', icon: 'fa-brain' } ].map(item => `
                <button onclick="navigate('${item.id}')" id="nav-${item.id}" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-gray-400 hover:bg-gray-800"><i class="fas ${item.icon}"></i><span class="font-medium">${item.label}</span></button>
            `).join('');
            document.getElementById('mobile-nav').innerHTML = menuItems.map(item => `
                <button onclick="navigate('${item.id}')" id="mob-nav-${item.id}" class="mobile-sidebar-item shrink-0 w-[72px] flex flex-col items-center justify-center p-2 text-gray-400 transition rounded-xl"><i class="fas ${item.icon} text-lg mb-1"></i><span class="text-[9px] font-bold text-center leading-tight">${item.label}</span></button>
            `).join('');
        }

        function navigate(id) {

r-gray-700 text-sm outline-none focus:border-blue-500 transition"></div></div></div></div>`;
        }

        // --- KONULARIM ---
        function renderKonular(el) {

        // --- PROGRAM ---
        let currentWeekOffset = 0; let currentTaskDate = ''; let currentTaskDayName = '';
        function getWeekDates(offset = 0) {
            const curr = new Date(); const first = curr.getDate() - curr.getDay() + (curr.getDay() === 0 ? -6 : 1) + (offset * 7);

            for (let i = 0; i < 7; i++) { let next = new Date(monday); next.setDate(monday.getDate() + i); week.push({ dayName: daysArr[next.getDay()], dateStr: formatDateNumeric(next) }); }
            return week;
        }

            });
            weekDates.forEach(d => { if(document.getElementById(`count-${d.dateStr}`)) document.getElementById(`count-${d.dateStr}`).innerText = counts[d.dateStr]; });
        }

        function doneTaskPrompt(id) {

            const sure = mins && !isNaN(parseInt(mins)) ? parseInt(mins) : 0;

        function doneTask(id, mins = 0) {

        // --- KRONOMETRE ---
        let swInt;
        function renderKronometre(el) {
            el.innerHTML = `<div class="grid lg:grid-cols-3 gap-6 h-full pb-10"><div class="lg:col-span-2 flex flex-col items-center justify-center py-10 glass rounded-2xl h-fit"><div id="sw-display" class="text-7xl md:text-9xl font-mono font-bold mb-10 text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">00:00:00</div><div class="flex flex-wrap justify-center gap-4"><button id="sw-start-btn" onclick="toggleSW()" class="px-8 py-4 bg-green-600 rounded-2xl font-bold text-lg shadow-lg hover:scale-105 transition active:scale-95">BAŞLAT</button><button onclick="lapSW()" class="px-8 py-4 bg-yellow-600 rounded-2xl font-bold text-lg shadow-lg hover:scale-105 transition active:scale-95">TUR</button><button onclick="resetSW()" class="px-8 py-4 bg-gray-800 rounded-2xl font-bold text-lg border border-gray-700 hover:bg-gray-700 transition active:scale-95">SIFIRLA</button></div></div><div class="glass p-6 rounded-2xl flex flex-col max-h-[500px]"><h3 class="font-bold text-blue-400 border-b border-gray-700 pb-2 mb-4"><i class="fas fa-flag-checkered mr-2"></i>Tur Kayıtları</h3><div id="laps-list" class="flex-1 overflow-y-auto space-y-3 pr-2 hide-scroll"></div></div></div>`;
            updateSW(); renderLaps();

        function toggleSW() {
            if(!appData.stopwatch.running) {
                appData.stopwatch.running = true; appData.stopwatch.startTime = Date.now() - appData.stopwatch.elapsed;
                swInt = setInterval(updateSW, 1000);
                document.getElementById('sw-start-btn').innerText = 'DURDUR'; document.getElementById('sw-start-btn').className = 'px-8 py-4 bg-red-600 rounded-2xl font-bold text-lg shadow-lg hover:scale-105 transition active:scale-95';
            } else {
                appData.stopwatch.running = false; clearInterval(swInt);
                document.getElementById('sw-start-btn').innerText = 'DEVAM ET'; document.getElementById('sw-start-btn').className = 'px-8 py-4 bg-green-600 rounded-2xl font-bold text-lg shadow-lg hover:scale-105 transition active:scale-95';
            } save();
        }

        function updateSW() {
            if(appData.stopwatch.running) appData.stopwatch.elapsed = Date.now() - appData.stopwatch.startTime;
            const s = Math.floor(appData.stopwatch.elapsed/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
            const str = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            if(document.getElementById('sw-display')) document.getElementById('sw-display').innerText = str;
            const b = document.getElementById('timer-badge');
            if(appData.stopwatch.running) { b.innerText = str; b.classList.remove('hidden'); } else b.classList.add('hidden');
        }

        function lapSW() {
            if(!appData.stopwatch.running && appData.stopwatch.elapsed === 0) return;
            const curr = appData.stopwatch.running ? (Date.now() - appData.stopwatch.startTime) : appData.stopwatch.elapsed;
            const lapElapsed = curr - (appData.stopwatch.lastLapElapsed || 0); appData.stopwatch.lastLapElapsed = curr;
            const s = Math.floor(lapElapsed/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
            appData.activeLaps.unshift({ id: Date.now(), timeStr: `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`, mins: Math.floor(lapElapsed/60000) });
            save(); renderLaps();
        }

        function renderLaps() {
            const c = document.getElementById('laps-list'); if(!c) return;
            if(appData.activeLaps.length === 0) { c.innerHTML = '<div class="text-gray-500 text-sm text-center mt-10"><i class="fas fa-stopwatch text-3xl mb-2 opacity-30"></i><br>Tur kaydı yok.</div>'; return; }
            c.innerHTML = appData.activeLaps.map((lap, i) => `
                <div class="p-3 bg-gray-800/80 rounded-xl border border-gray-700 animate-in slide-in-from-left-4">
                    <div class="flex justify-between items-center mb-2"><span class="font-bold text-blue-400 text-sm">Tur ${appData.activeLaps.length - i}</span><span class="font-mono text-sm bg-black/40 px-2 py-1 rounded">${lap.timeStr}</span></div>
                    <input type="text" id="lap-subj-${lap.id}" placeholder="Konu/Ders" class="w-full bg-black/40 p-2 rounded-lg text-sm border border-gray-700 mb-2 outline-none">
                    <div class="flex items-center gap-2 mb-2">
                        <select id="lap-type-${lap.id}" class="bg-black/40 p-2 rounded-lg text-sm border border-gray-700 outline-none w-full">
                            <option value="extra">Ekstra Çalışma</option>
                            <option value="program">Programdan Çalıştım</option>
                        </select>
                    </div>
                    <div class="flex gap-2"><input type="number" id="lap-q-${lap.id}" placeholder="Soru Sayısı" class="w-full bg-black/40 p-2 rounded-lg text-sm border border-gray-700 outline-none"><button onclick="saveLap(${lap.id})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition">Kaydet</button></div>
                </div>
            `).join('');
        }

        function saveLap(id) {
            const idx = appData.activeLaps.findIndex(l => l.id === id); if(idx === -1) return;
            const lap = appData.activeLaps[idx];
            const subj = document.getElementById(`lap-subj-${id}`).value.trim() || 'Genel';
            const qs = parseInt(document.getElementById(`lap-q-${id}`).value) || 0;
            const type = document.getElementById(`lap-type-${id}`).value;

            if (type === 'program') {
                // Programda aynı konuyu içeren aktif görev ara
                const matchingTask = appData.tasks.find(t => t.konu === subj && t.status === 'pending');
                if (matchingTask) {
                    // görevi tamamla, soru sayısını görevden al, süreyi turdan al
                    matchingTask.status = 'done';
                    appData.performance.totalQuestions += matchingTask.q;
                    appData.performance.totalMinutes += lap.mins;
                    appData.performance.history.push({ id: Date.now(), date: formatDateNumeric(new Date()), mins: lap.mins, qs: matchingTask.q, subject: subj });
                    appData.studyDates[subj] = Date.now();
                    showToast(`Programdaki "${subj}" görevi tamamlandı!`, "success");
                } else {
                    // eşleşen görev yok, yine de performansa ekle
                    appData.performance.totalMinutes += lap.mins;
                    appData.performance.totalQuestions += qs;
                    appData.performance.history.push({ id: Date.now(), date: formatDateNumeric(new Date()), mins: lap.mins, qs, subject: subj });
                    if(subj !== 'Genel') appData.studyDates[subj] = Date.now();
                    showToast("Eşleşen program görevi bulunamadı, ekstra kaydedildi.", "warning");
                }
            } else {
                // ekstra çalışma
                appData.performance.totalMinutes += lap.mins;
                appData.performance.totalQuestions += qs;
                appData.performance.history.push({ id: Date.now(), date: formatDateNumeric(new Date()), mins: lap.mins, qs, subject: subj });
                if(subj !== 'Genel') appData.studyDates[subj] = Date.now();
                showToast("Ekstra çalışma kaydedildi!", "success");
            }

            appData.activeLaps.splice(idx, 1);
            save(); renderLaps(); renderProgram(document.getElementById('view-container'));
        }

        function resetSW() { appData.stopwatch = { running: false, startTime: null, elapsed: 0, lastLapElapsed: 0 }; clearInterval(swInt); save(); updateSW(); document.getElementById('sw-start-btn').innerText = 'BAŞLAT'; document.getElementById('sw-start-btn').className = 'px-8 py-4 bg-green-600 rounded-2xl font-bold text-lg shadow-lg hover:scale-105 transition active:scale-95'; }

        // --- DENEME ANALİZİ ---
        let viewMode = 'list';

            if(viewMode === 'list') renderExams();
            if(viewMode === 'chart') drawCharts();

        function renderDenemeList() {
            return `<div class="grid lg:grid-cols-2 gap-6 pb-10"><div class="glass p-6 rounded-2xl group relative overflow-hidden h-fit"><div class="absolute inset-0 bg-blue-600/5 group-hover:bg-blue-600/10 transition pointer-events-none"></div><h3 class="font-bold mb-2 text-blue-400 flex items-center gap-2"><i class="fas fa-robot"></i> Akıllı Sınav Okuyucu</h3><p class="text-xs text-gray-400 mb-4">Toplu PDF atabilirsiniz. TYT'yi tam, AYT'yi Sayısal (Mat+Fen) olarak analiz eder ve eksik MEB kazanımlarını bulur.</p><div class="mb-4"><label class="text-xs text-gray-400">AYT Okunacak Alan:</label><select id="exam-alan" class="w-full bg-gray-800 p-2 rounded-lg border border-gray-700 text-sm mt-1 outline-none text-white font-bold"><option value="SAY">Sayısal (Mat + Fen) - Edebiyat ve Sosyal'i yoksayar</option><option value="TUM">Tüm Dersleri Oku</option></select></div><label class="w-full py-8 border-2 border-dashed border-gray-600 hover:border-blue-500 rounded-xl flex flex-col items-center justify-center cursor-pointer transition bg-black/20"><i class="fas fa-copy text-4xl text-gray-500 mb-2 group-hover:text-blue-400"></i><span class="font-bold text-gray-300">PDF Seç (Toplu)</span><input type="file" accept="application/pdf" multiple class="hidden" onchange="handlePDFUpload(event)"></label><div id="pdf-loading" class="hidden mt-4 text-center text-sm text-blue-400 animate-pulse font-bold"><i class="fas fa-spinner fa-spin mr-2"></i> PDF Okunuyor...</div></div><div class="glass p-6 rounded-2xl flex flex-col"><div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2"><h3 class="font-bold text-blue-400">Geçmiş Denemeler</h3></div><div id="exam-list" class="space-y-3 overflow-y-auto flex-1 pr-2 hide-scroll max-h-[500px]"></div></div></div>`;
        }

        async function handlePDFUpload(event) {
            const files = event.target.files; if (!files || files.length === 0) return;
            const alan = document.getElementById('exam-alan').value;
            const loadingEl = document.getElementById('pdf-loading'); loadingEl.classList.remove('hidden');
            let successCount = 0;
            for (let i = 0; i < files.length; i++) {
                if (files[i].type !== "application/pdf") continue;
                loadingEl.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> ${i+1} / ${files.length} Okunuyor...`;
                try {
                    const pdf = await pdfjsLib.getDocument(new Uint8Array(await files[i].arrayBuffer())).promise;
                    let fullText = "";
                    for (let p = 1; p <= pdf.numPages; p++) fullText += (await (await pdf.getPage(p)).getTextContent()).items.map(item => item.str).join(" ") + " \n";
                    const examData = extractDataFromText(fullText, alan);
                    if(examData) { appData.exams.unshift(examData); successCount++; }
                } catch (err) { console.log(err); }
            }
            loadingEl.classList.add('hidden'); event.target.value = ''; 
            if (successCount > 0) { save(); renderExams(); showToast(`${successCount} sınav ve eksikler eklendi.`, "success"); } else { showToast("Sınav tespit edilemedi.", "error"); }
        }

        function extractDataFromText(txt, alan) {
            if(!txt) return null;
            let cleanTxt = txt.replace(/\r/g, '').replace(/Α/g, 'A').replace(/Υ/g, 'Y').replace(/Τ/g, 'T').replace(/Μ/g, 'M').replace(/Κ/g, 'K').replace(/Β/g, 'B');
            let lines = cleanTxt.split('\n');

            let examName = '';
            for (let line of lines) {
                let match = line.match(/([A-Z0-9ĞÜŞİÖÇ][A-Z0-9ĞÜŞİÖÇ\s\-.,!]+(?:YAYINLARI|YAYINCILIK|DENEME|KURUMSAL|TÜRKİYE GENELİ|ÖZEL|SINAVI)[^\n]*)/);
                if (match) { examName = match[1].trim().substring(0,60); break; }
            }
            if (!examName) {
                let firstLine = lines.find(l => l.trim().length > 20 && l.toUpperCase() === l);
                if (firstLine) examName = firstLine.trim().substring(0,60);
            }

            let type = cleanTxt.match(/AYT|Alan Yeterlilik/i) ? 'AYT' : 'TYT';
            let b = { MAT: {d:0, y:0, t:40}, FZK: {d:0, y:0, t: type==='AYT'?14:7}, KMY: {d:0, y:0, t: type==='AYT'?13:7}, BY: {d:0, y:0, t: type==='AYT'?13:6}, TURK: {d:0, y:0, t:40}, SOS: {d:0, y:0, t:20} };
            let autoTopics = [];

            for(let i=0; i<lines.length; i++) {
                let line = lines[i];
                let match = line.match(/(?:TYT|AYT)\.?(MAT|FZK|KMY|BY|TRH|CGR|FLSF|DKAB|TDE|SYLJ|PSKL|MNTK)\.([\d\.]+)\s+(.*)/i);
                if(match) {
                    let rawDers = match[1].toUpperCase();
                    let konuRaw = match[3].trim().replace(/['"“”]/g, '');
                    let isSAY = ['MAT','FZK','KMY','BY'].includes(rawDers);
                    if (alan === 'SAY' && type === 'AYT' && !isSAY) continue;

                    let dersKey = rawDers;
                    if(['TRH','CGR','FLSF','DKAB','TDE','SYLJ','PSKL','MNTK'].includes(rawDers)) dersKey = 'SOS';
                    let ctx = (lines[i-1]||'') + line + (lines[i+1]||'');
                    let hasPlus = /\+/.test(ctx);
                    let hasMinus = /\-/.test(ctx) || /[a-z]/.test(line.split(/(?:AYT|TYT)/)[0]||'');

                    if(hasPlus) {
                        if(b[dersKey]) b[dersKey].d++;
                    } else if(hasMinus) {
                        if(b[dersKey]) b[dersKey].y++;
                        let konuSade = konuRaw.replace(/(açıklar|kavrar|çözer|belirler|örnekler verir|analiz eder|fark eder|irdeler|sınıflandırarak|yorumlar|ile ilgili).*?/gi, '').trim();
                        if(konuSade.length > 3) autoTopics.push({ name: konuSade, status: "Yanlış" });
                    } else {
                        let konuSade = konuRaw.replace(/(açıklar|kavrar|çözer|belirler|örnekler verir|analiz eder|fark eder|irdeler|sınıflandırarak|yorumlar|ile ilgili).*?/gi, '').trim();
                        if(konuSade.length > 3) autoTopics.push({ name: konuSade, status: "Boş" });
                    }
                }
            }

            let matN = b.MAT.d - (b.MAT.y * 0.25);
            let fizN = b.FZK.d - (b.FZK.y * 0.25);
            let kimN = b.KMY.d - (b.KMY.y * 0.25);
            let biyoN = b.BY.d - (b.BY.y * 0.25);
            let fenN = fizN + kimN + biyoN;
            let turkN = b.TURK.d - (b.TURK.y * 0.25);
            let sosN = b.SOS.d - (b.SOS.y * 0.25);

            let totalNet = 0;
            if(alan === 'SAY' && type === 'AYT') totalNet = matN + fenN;
            else totalNet = matN + fenN + turkN + sosN;

            if(totalNet <= 0) {
                let fb = txt.match(/(?:120|160|166|80)\s+\d{1,3}\s+\d{1,3}\s+\d{1,3}\s+(\d{1,3}(?:,\d{1,2})?)/);
                if(fb) totalNet = parseFloat(fb[1].replace(',','.'));
            }

            let detailHtml = `<div class="grid grid-cols-2 lg:grid-cols-4 gap-2 text-center text-[11px] bg-black/40 p-3 rounded-lg mt-2 font-mono">`;
            if(b.MAT.d>0 || b.MAT.y>0) detailHtml += `<div><b class="text-blue-400">MAT</b> ${matN.toFixed(2)} N</div>`;
            if(type === 'AYT' && alan === 'SAY') {
                if(b.FZK.d>0||b.FZK.y>0) detailHtml += `<div><b class="text-blue-400">FZK</b> ${fizN.toFixed(2)} N</div>`;
                if(b.KMY.d>0||b.KMY.y>0) detailHtml += `<div><b class="text-blue-400">KMY</b> ${kimN.toFixed(2)} N</div>`;
                if(b.BY.d>0||b.BY.y>0) detailHtml += `<div><b class="text-blue-400">BY</b> ${biyoN.toFixed(2)} N</div>`;
            } else {
                if(fenN!==0) detailHtml += `<div><b class="text-blue-400">FEN</b> ${fenN.toFixed(2)} N</div>`;
                if(turkN!==0) detailHtml += `<div><b class="text-blue-400">TR</b> ${turkN.toFixed(2)} N</div>`;
                if(sosN!==0) detailHtml += `<div><b class="text-blue-400">SOS</b> ${sosN.toFixed(2)} N</div>`;
            }
            detailHtml += `</div>`;

            // Eksik konuları derslere göre grupla
            let topicsByDers = {};
            autoTopics.forEach(t => {
                // konuyu müfredatla eşleştirip ders adını bul
                let dersAdi = "Genel";
                for(let ex in tytAytKonulari) {
                    for(let d in tytAytKonulari[ex]) {
                        if(tytAytKonulari[ex][d].some(k => k.toLowerCase().includes(t.name.toLowerCase().substring(0,10)))) {
                            dersAdi = d; break;
                        }
                    }
                    if(dersAdi !== "Genel") break;
                }
                if(!topicsByDers[dersAdi]) topicsByDers[dersAdi] = [];
                topicsByDers[dersAdi].push(t);
            });

            let formattedTopics = [];
            for(let ders in topicsByDers) {
                let konular = topicsByDers[ders];
                formattedTopics.push({ ders: ders, konular: konular });
            }

            return { 
                id: Date.now() + Math.floor(Math.random()*1000), 
                name: examName || (type + " Denemesi"), date: formatDateNumeric(new Date()), type: type, net: totalNet, 
                detailsHtml: detailHtml, topics: formattedTopics,
                branches: { mat: matN, fen: fenN, turk: turkN, sos: sosN } 
            };
        }

        function renderExams() {
            const c = document.getElementById('exam-list'); if(!c) return;
            if(appData.exams.length === 0) { c.innerHTML = '<div class="text-center p-5 text-gray-500 text-sm">Deneme kaydı yok.</div>'; return; }
            c.innerHTML = appData.exams.map(e => `
                <div class="p-4 bg-gray-800/60 border border-gray-700/50 rounded-xl hover:bg-gray-800 transition">
                    <div class="flex justify-between items-center mb-1"><div class="flex flex-col"><span class="font-bold text-blue-400 text-md">${e.name}</span><span class="text-xs text-gray-500">${e.type} | ${e.date}</span></div><div class="text-green-400 font-bold text-2xl">${e.net.toFixed(2)} N</div></div>
                    ${e.detailsHtml}
                    <div class="flex justify-between items-center border-t border-gray-700/50 pt-3 mt-3">
                        <button onclick="openExamAnalysisModal(${e.id})" class="text-xs text-yellow-500 bg-yellow-500/10 px-3 py-1.5 rounded-lg hover:bg-yellow-500 hover:text-white transition"><i class="fas fa-microscope"></i> Eksikler (${e.topics.reduce((a,b)=>a+b.konular.length,0)})</button>
                        <button onclick="deleteExam(${e.id})" class="w-8 h-8 rounded-lg bg-red-900/20 text-red-500 hover:bg-red-600 hover:text-white"><i class="fas fa-trash text-sm"></i></button>
                    </div>
                </div>
            `).join('');
        }
        function deleteExam(id) { appData.exams = appData.exams.filter(e => e.id !== id); save(); renderExams(); showToast("Deneme silindi.", "success"); }

        function destroyCharts() {
            if (appData.chartInstances.tyt) { appData.chartInstances.tyt.destroy(); appData.chartInstances.tyt = null; }
            if (appData.chartInstances.ayt) { appData.chartInstances.ayt.destroy(); appData.chartInstances.ayt = null; }
        }

        function drawCharts() {
            destroyCharts();
            const tytExams = appData.exams.filter(e => e.type === 'TYT').slice().reverse();
            const aytExams = appData.exams.filter(e => e.type === 'AYT').slice().reverse();
            const chartOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#9ca3af' } } }, scales: { x: { ticks: { color: '#9ca3af', maxRotation: 45, font: {size:10} } }, y: { beginAtZero: true, ticks: { color: '#9ca3af' } } } };

            if(document.getElementById('tytChart') && tytExams.length > 0) {
                appData.chartInstances.tyt = new Chart(document.getElementById('tytChart'), { 
                    type: 'line', 
                    data: { labels: tytExams.map(e => e.name.substring(0,20)), datasets: [
                        { label: 'TYT Toplam', data: tytExams.map(e=>e.net), borderColor: '#8b5cf6', fill: true },
                        { label: 'Mat', data: tytExams.map(e=>e.branches.mat), borderColor: '#3b82f6', borderDash: [5,5] },
                        { label: 'Tr', data: tytExams.map(e=>e.branches.turk), borderColor: '#ef4444', borderDash: [5,5] },
                        { label: 'Fen', data: tytExams.map(e=>e.branches.fen), borderColor: '#22c55e', borderDash: [5,5] },
                        { label: 'Sos', data: tytExams.map(e=>e.branches.sos), borderColor: '#f59e0b', borderDash: [5,5] }
                    ]}, 
                    options: { ...chartOptions, scales: { ...chartOptions.scales, y: { max: 120 } } } 
                });
            }
            if(document.getElementById('aytChart') && aytExams.length > 0) {
                appData.chartInstances.ayt = new Chart(document.getElementById('aytChart'), { 
                    type: 'line', 
                    data: { labels: aytExams.map(e => e.name.substring(0,20)), datasets: [
                        { label: 'AYT Sayısal', data: aytExams.map(e=>e.net), borderColor: '#f97316', fill: true },
                        { label: 'Mat', data: aytExams.map(e=>e.branches.mat), borderColor: '#3b82f6', borderDash: [5,5] },
                        { label: 'Fen', data: aytExams.map(e=>e.branches.fen), borderColor: '#22c55e', borderDash: [5,5] }
                    ]}, 
                    options: { ...chartOptions, scales: { y: { max: 80 } } } 
                });
            }
        }

        function renderDenemeCharts() {
            let counts = {};
            appData.exams.forEach(e => { e.topics.forEach(t => { t.konular.forEach(k => { counts[k.name] = (counts[k.name] || 0) + 1; }); }); });
            let sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
            return `<div class="space-y-6"><div class="glass p-6 rounded-2xl h-[350px]"><h3 class="font-bold text-orange-400 mb-2 text-center">AYT Net Gelişimi</h3><div class="h-full"><canvas id="aytChart"></canvas></div></div><div class="glass p-6 rounded-2xl h-[350px]"><h3 class="font-bold text-blue-400 mb-2 text-center">TYT Net Gelişimi</h3><div class="h-full"><canvas id="tytChart"></canvas></div></div><div class="glass p-6 rounded-2xl"><h3 class="font-bold text-red-400 mb-4">Sık Hata Yapılan Konular</h3><div class="grid md:grid-cols-2 gap-4">${sorted.length === 0 ? '<p class="text-gray-500">Henüz eksik analiz yok.</p>' : sorted.map(t => `<div class="flex justify-between bg-black/20 p-4 rounded-xl"><span>${t[0]}</span><span class="text-red-400 font-bold">${t[1]} Hata</span></div>`).join('')}</div></div></div>`;
        }

        let currentExamIdForAnalysis = null;
        function openExamAnalysisModal(examId) { currentExamIdForAnalysis = examId; document.getElementById('exam-analysis-modal').classList.remove('hidden'); renderEAList(); }
        function closeExamAnalysisModal() { document.getElementById('exam-analysis-modal').classList.add('hidden'); renderExams(); }
        function updateEAModalSubj() { const [ex, d] = document.getElementById('ea-ders').value.split('-'); document.getElementById('ea-konu').innerHTML = tytAytKonulari[ex][d].map(k=>`<option value="${k}">${k}</option>`).join(''); }
        function addExamTopic(status) {
            const d = document.getElementById('ea-ders').value, k = document.getElementById('ea-konu').value; if(!d || !k) return;
            const exam = appData.exams.find(e => e.id === currentExamIdForAnalysis);
            let dersGroup = exam.topics.find(t => t.ders === d);
            if(!dersGroup) { dersGroup = { ders: d, konular: [] }; exam.topics.push(dersGroup); }
            dersGroup.konular.push({ name: k, status: status }); save(); renderEAList();
        }
        function renderEAList() {
            const exam = appData.exams.find(e => e.id === currentExamIdForAnalysis);
            let html = '';
            if(exam.topics.length === 0) html = '<p class="text-gray-500 text-sm text-center">Henüz eksik konu eklenmedi.</p>';
            else {
                exam.topics.forEach(group => {
                    html += `<div class="mb-3"><h4 class="text-sm font-bold text-blue-300 mb-1">${group.ders}</h4>`;
                    group.konular.forEach(t => {
                        html += `<div class="flex justify-between items-center bg-gray-800 p-2 rounded-lg mb-1"><span class="text-xs font-medium">${t.name}</span><div class="flex items-center gap-2"><span class="text-xs px-2 py-0.5 rounded ${t.status==='Yanlış'?'bg-red-500/20 text-red-400':'bg-yellow-500/20 text-yellow-400'}">${t.status}</span><button onclick="removeExamTopicFromGroup('${group.ders}','${t.name}')" class="text-gray-500 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button></div></div>`;
                    });
                    html += `</div>`;
                });
            }
            document.getElementById('ea-list').innerHTML = html;
        }
        function removeExamTopicFromGroup(ders, konu) {
            const exam = appData.exams.find(e => e.id === currentExamIdForAnalysis);
            const group = exam.topics.find(t => t.ders === ders);
            if(group) group.konular = group.konular.filter(k => k.name !== konu);
            save(); renderEAList();
        }

        // --- PERFORMANS ---
        function renderPerformans(el) {
            const groups = {};
            appData.performance.history.forEach(h => {
                if(!groups[h.date]) groups[h.date] = { mins: 0, qs: 0, items: [] };
                groups[h.date].mins += h.mins; groups[h.date].qs += h.qs;
                groups[h.date].items.push(h);
            });
            const sortedDates = Object.keys(groups).sort((a,b) => new Date(b.split('.')[2],b.split('.')[1]-1,b.split('.')[0]) - new Date(a.split('.')[2],a.split('.')[1]-1,a.split('.')[0]));
            el.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8"><div class="glass p-6 rounded-2xl border-t-4 border-blue-500 text-center"><div class="text-xs text-gray-400 uppercase">Toplam Süre</div><div class="text-3xl font-bold">${Math.floor(appData.performance.totalMinutes/60)}sa ${appData.performance.totalMinutes%60}dk</div></div><div class="glass p-6 rounded-2xl border-t-4 border-green-500 text-center"><div class="text-xs text-gray-400 uppercase">Çözülen Soru</div><div class="text-3xl font-bold">${appData.performance.totalQuestions}</div></div><div class="glass p-6 rounded-2xl border-t-4 border-orange-500 text-center"><div class="text-xs text-gray-400 uppercase">Biten Konu</div><div class="text-3xl font-bold">${Object.keys(appData.subjects).length}</div></div></div><div class="glass p-6 rounded-2xl"><h3 class="font-bold mb-4 text-blue-400">Detaylı Çalışma Geçmişi</h3><div class="space-y-6">${sortedDates.length===0?'<p class="text-gray-500">Kayıt yok.</p>':sortedDates.map(date=>`<div><div class="flex justify-between items-center mb-2 border-b border-gray-700/50 pb-1"><h4 class="font-bold text-gray-300"><i class="fas fa-calendar-day mr-2"></i>${date}</h4><span class="text-xs font-bold text-blue-400 bg-blue-500/10 px-2 py-1 rounded">${groups[date].qs} Soru | ${groups[date].mins} dk</span></div><div class="space-y-2">${groups[date].items.reverse().map(i=>`<div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-transparent hover:border-gray-700 transition group"><div><span class="text-sm font-medium">${i.subject}</span><span class="text-[10px] text-gray-500 ml-2">${i.mins>0?i.mins+' dk - ':''}${i.qs} Soru</span></div><button onclick="deletePerformance(${i.id})" class="w-8 h-8 rounded-lg bg-red-900/20 text-red-500 hover:bg-red-600 hover:text-white opacity-100 sm:opacity-0 group-hover:opacity-100"><i class="fas fa-trash text-sm"></i></button></div>`).join('')}</div></div>`).join('')}</div></div>`;
        }
        function deletePerformance(id) { const idx = appData.performance.history.findIndex(h=>h.id===id); if(idx>-1){ appData.performance.totalQuestions -= appData.performance.history[idx].qs; appData.performance.totalMinutes -= appData.performance.history[idx].mins; appData.performance.history.splice(idx,1); save(); renderPerformans(document.getElementById('view-container')); showToast("Kayıt silindi.","success"); } }

        // --- UNUTMA EĞRİSİ ---
        function renderUnutma(el) {
            const now = Date.now();
            const konular = Object.keys(appData.studyDates).map(konuAdi => {
                const gun = Math.floor((now - appData.studyDates[konuAdi])/(1000*60*60*24));
                return { konuAdi, gun };
            }).sort((a,b)=>a.gun-b.gun);
            let html = `<div class="space-y-4 max-w-2xl mx-auto pb-10"><div class="p-5 bg-blue-600/10 border border-blue-500/30 rounded-2xl text-sm leading-relaxed flex items-start gap-4"><i class="fas fa-info-circle text-blue-500 text-2xl mt-0.5"></i><div><span class="font-bold text-blue-400 block mb-1">Ebbinghaus Unutma Eğrisi</span>Çalıştığın konular burada listelenir. Bar doldukça tekrar zamanın yaklaşır.<div class="flex items-center gap-4 mt-2 text-xs"><span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-yellow-500"></span> 3. Gün</span><span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-orange-500"></span> 7. Gün</span><span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-500"></span> 30. Gün</span></div></div></div>`;
            if(konular.length===0) html+='<div class="text-center p-10 glass rounded-2xl text-gray-500">Henüz tekrar edilecek konu yok.</div>';
            else {
                html+=konular.map(k=>{
                    let barWidth=0,barColor='bg-blue-500',durumText='',icon='fa-clock';
                    if(k.gun<3){ barWidth=(k.gun/3)*15; barColor='bg-blue-500'; durumText=`${3-k.gun} gün sonra 1. tekrar`; icon='fa-hourglass-start'; }
                    else if(k.gun>=3&&k.gun<5){ barWidth=15+((k.gun-3)/2)*15; barColor='bg-yellow-500'; durumText='⚠️ 3. gün tekrarı yapılmalı'; icon='fa-exclamation-triangle'; }
                    else if(k.gun>=5&&k.gun<7){ barWidth=30+((k.gun-5)/2)*15; barColor='bg-yellow-200'; durumText=`${7-k.gun} gün sonra 2. tekrar`; icon='fa-hourglass-half'; }
                    else if(k.gun>=7&&k.gun<9){ barWidth=45+((k.gun-7)/2)*15; barColor='bg-orange-500'; durumText='⚠️ 7. gün tekrarı yapılmalı'; icon='fa-exclamation-circle'; }
                    else if(k.gun>=9&&k.gun<30){ barWidth=60+((k.gun-9)/21)*25; barColor='bg-orange-200'; durumText=`${30-k.gun} gün sonra 3. tekrar`; icon='fa-hourglass-end'; }
                    else if(k.gun>=30&&k.gun<32){ barWidth=85+((k.gun-30)/2)*15; barColor='bg-red-500'; durumText='⚠️ 30. gün tekrarı yapılmalı'; icon='fa-exclamation-circle'; }
                    else{ barWidth=100; barColor='bg-green-500'; durumText='✅ Tamamlandı'; icon='fa-check-circle'; }
                    return `<div class="glass p-4 rounded-xl border border-gray-700/50 hover:border-gray-600 transition"><div class="flex justify-between items-center mb-2"><div class="flex items-center gap-2"><i class="fas ${icon} text-sm ${barColor.replace('bg-','text-').replace('-500','-400').replace('-200','-200')}"></i><span class="font-semibold text-gray-100">${k.konuAdi}</span></div><span class="text-xs text-gray-400">${k.gun} gün önce</span></div><div class="w-full bg-gray-700 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full transition-all duration-700 ${barColor}" style="width:${barWidth}%"></div></div><p class="text-xs mt-2 text-gray-400">${durumText}</p></div>`;
                }).join('');
            }
            el.innerHTML = html+'</div>';
        }

        // --- AYARLAR ---
        function renderAyarlar(el) {
            el.innerHTML = `<div class="max-w-md mx-auto space-y-6 pb-10"><button onclick="logout()" class="w-full py-3 bg-yellow-600 hover:bg-yellow-700 rounded-xl font-bold"><i class="fas fa-sign-out-alt mr-2"></i> Çıkış Yap</button><div class="glass p-6 rounded-2xl text-center"><i class="fas fa-cloud-download-alt text-4xl text-blue-500 mb-4"></i><h3 class="font-bold mb-2">Verileri Yedekle</h3><button onclick="exportData()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold">İndir (.json)</button></div><div class="glass p-6 rounded-2xl text-center"><i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i><h3 class="font-bold mb-2">Veri Yükle</h3><label class="w-full py-3 bg-gray-700 hover:bg-gray-600 rounded-xl font-bold flex items-center justify-center cursor-pointer">Dosya Seç<input type="file" onchange="importData(event)" accept=".json" class="hidden"></label></div><button onclick="if(confirm('Emin misin?')){localStorage.removeItem('yks_analiz_data');localStorage.removeItem('yks_session');location.reload();}" class="w-full py-4 text-red-500 border border-red-500/20 rounded-xl hover:bg-red-600 hover:text-white font-bold"><i class="fas fa-trash-alt mr-2"></i>Tüm Sistemi Sıfırla</button></div>`;
        }
        function exportData() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(appData)], {type: 'application/json'})); a.download=`yks_yedek_${formatDateNumeric(new Date())}.json`; a.click(); }
        function importData(e) { const r = new FileReader(); r.onload=(ev)=>{ try { appData=JSON.parse(ev.target.result); save(); location.reload(); } catch(err) { showToast("Bozuk dosya!", "error"); } }; r.readAsText(e.target.files[0]); }
    </script>
</body>
</html>
